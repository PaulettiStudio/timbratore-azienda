<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timbratore GPS Aziendale</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans flex flex-col justify-between min-h-screen p-4">

    <div class="w-full max-w-md mx-auto bg-white p-6 rounded-2xl shadow-md mt-4">
        <header class="text-center mb-6">
            <h1 class="text-2xl font-bold text-slate-900">Rilevazione Presenze</h1>
            <p class="text-sm text-slate-500">Timbratura tramite Geofencing GPS</p>
        </header>

        <div class="mb-6">
            <label class="block text-xs font-bold uppercase text-slate-500 mb-2">Chi sta timbrando?</label>
            <select id="select-dipendente" class="w-full border border-slate-300 p-3 rounded-xl text-base bg-slate-50"></select>
        </div>

        <div class="flex flex-col items-center justify-center p-6 bg-slate-50 rounded-2xl mb-6 border border-dashed border-slate-300">
            <div id="gps-icon" class="text-slate-400 mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-14 w-14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </div>
            <p id="gps-status" class="text-sm font-semibold text-slate-600 text-center">Verifica della posizione in corso...</p>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-4">
            <button onclick="timbra('ingresso_mattina')" id="btn-ing-mat" disabled class="bg-slate-300 text-slate-500 font-bold p-4 rounded-xl text-sm transition">Ingresso Mattina</button>
            <button onclick="timbra('uscita_mattina')" id="btn-usc-mat" disabled class="bg-slate-300 text-slate-500 font-bold p-4 rounded-xl text-sm transition">Uscita Mattina</button>
        </div>
        <div class="grid grid-cols-2 gap-3 mb-6">
            <button onclick="timbra('ingresso_pomeriggio')" id="btn-ing-pom" disabled class="bg-slate-300 text-slate-500 font-bold p-4 rounded-xl text-sm transition">Ingresso Pom.</button>
            <button onclick="timbra('uscita_pomeriggio')" id="btn-usc-pom" disabled class="bg-slate-300 text-slate-500 font-bold p-4 rounded-xl text-sm transition">Uscita Pom.</button>
        </div>

        <button onclick="controllaPosizione()" class="w-full text-center text-sm font-medium text-sky-600 py-2 hover:underline flex justify-center items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 15H19" /></svg>
            Aggiorna Posizione GPS
        </button>
    </div>

    <footer class="text-center text-xs text-slate-400 my-4">
        &copy; Sistema Gestione Presenze Aziendale
    </footer>

    <script>
        // CONFIGURAZIONE CREDENZIALI SUPABASE
        const SUPABASE_URL = 'https://tuo-id-progetto.supabase.co';
        const SUPABASE_KEY = 'tua-chiave-anonima-public';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // IMPOSTA COORDINATE DELLA SEDE E RAGGIO TOLLERANZA (IN METRI)
        const LAT_SEDE = 41.890251; 
        const LON_SEDE = 12.492373; 
        const RAGGIO_MASSIMO = 60.0; 

        let inAzienda = false;
        let ultimaPosizione = null;

        async function caricaDipendenti() {
            const { data, error } = await supabaseClient.from('dipendenti').select('id, nome, cognome');
            if (error) { alert("Errore caricamento dipendenti"); return; }
            const select = document.getElementById('select-dipendente');
            data.forEach(d => {
                select.innerHTML += `<option value="${d.id}">${d.nome} ${d.cognome}</option>`;
            });
        }

        function calcolaDistanza(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // Raggio della terra in metri
            const phi1 = lat1 * Math.PI/180;
            const phi2 = lat2 * Math.PI/180;
            const deltaPhi = (lat2-lat1) * Math.PI/180;
            const deltaLambda = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(deltaPhi/2) * Math.sin(deltaPhi/2) + Math.cos(phi1) * Math.cos(phi2) * Math.sin(deltaLambda/2) * Math.sin(deltaLambda/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; // Distanza in metri
        }

        function controllaPosizione() {
            if (!navigator.geolocation) {
                aggiornaInterfacciaStato(false, "Il tuo browser non supporta il GPS.");
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    ultimaPosizione = position.coords;
                    const distanza = calcolaDistanza(ultimaPosizione.latitude, ultimaPosizione.longitude, LAT_SEDE, LON_SEDE);
                    
                    if (distanza <= RAGGIO_MASSIMO) {
                        inAzienda = true;
                        aggiornaInterfacciaStato(true, `Sei nell'area aziendale.`);
                    } else {
                        inAzienda = false;
                        aggiornaInterfacciaStato(false, `Fuori area aziendale (Distanza: ${Math.round(distanza)}m).`);
                    }
                },
                (error) => {
                    aggiornaInterfacciaStato(false, "Attiva la geolocalizzazione sul telefono.");
                },
                { enableHighAccuracy: true }
            );
        }

        function aggiornaInterfacciaStato(attivo, messaggio) {
            const statusTesto = document.getElementById('gps-status');
            const icona = document.getElementById('gps-icon');
            const bottoni = ['btn-ing-mat', 'btn-usc-mat', 'btn-ing-pom', 'btn-usc-pom'];

            statusTesto.innerText = messaggio;

            if (attivo) {
                statusTesto.className = "text-sm font-semibold text-green-600 text-center";
                icona.className = "text-green-500 mb-2";
                bottoni.forEach(id => {
                    const btn = document.getElementById(id);
                    btn.disabled = false;
                    btn.className = "bg-sky-600 hover:bg-sky-700 text-white font-bold p-4 rounded-xl text-sm transition shadow-sm";
                });
            } else {
                statusTesto.className = "text-sm font-semibold text-red-500 text-center";
                icona.className = "text-red-400 mb-2";
                bottoni.forEach(id => {
                    const btn = document.getElementById(id);
                    btn.disabled = true;
                    btn.className = "bg-slate-300 text-slate-500 font-bold p-4 rounded-xl text-sm transition";
                });
            }
        }

        async function timbra(tipoAzione) {
            if (!inAzienda || !ultimaPosizione) {
                alert("Azione negata. Posizione non valida.");
                return;
            }

            const dipendenteId = document.getElementById('select-dipendente').value;

            const { error } = await supabaseClient.from('timbrature').insert({
                dipendente_id: dipendenteId,
                tipo_azione: tipoAzione,
                latitudine: ultimaPosizione.latitude,
                longitudine: ultimaPosizione.longitude
            });

            if (error) {
                alert("Errore di rete: " + error.message);
            } else {
                alert(`Timbratura di ${tipoAzione.replace('_', ' ')} registrata!`);
            }
        }

        // Avvio configurazione iniziale
        caricaDipendenti();
        controllaPosizione();
    </script>
</body>
</html>
