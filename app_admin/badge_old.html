<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Badge Presenze">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/128/16999/16999629.png">
    
    <title>Badge Digitale - Timbratura Presenze</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> touch-action: manipulation; </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col justify-between p-4 selection:bg-sky-500/30">

    <div id="loading-screen" class="fixed inset-0 bg-slate-900 flex flex-col items-center justify-center z-50 transition-opacity duration-300">
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-slate-700 border-t-sky-500 mb-4"></div>
        <p class="text-sm text-slate-400 font-medium tracking-wide animate-pulse">Verifica identità e posizione GPS...</p>
    </div>

    <div id="error-screen" class="hidden fixed inset-0 bg-slate-900 flex flex-col items-center justify-center p-6 text-center z-50">
        <div class="h-16 w-16 bg-rose-500/10 text-rose-500 rounded-full flex items-center justify-center mb-4 border border-rose-500/20">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
        </div>
        <h2 class="text-xl font-bold text-white mb-2" id="error-titolo">Accesso Negato</h2>
        <p class="text-sm text-slate-400 max-w-xs mb-6" id="error-messaggio">Si è verificato un problema.</p>
    </div>

    <div id="success-toast" class="fixed top-4 inset-x-4 max-w-sm mx-auto bg-emerald-500 text-white p-4 rounded-2xl shadow-2xl border border-emerald-400 transform -translate-y-32 opacity-0 transition-all duration-500 z-50 flex items-center gap-3">
        <div id="toast-icon-box" class="bg-white/20 p-2 rounded-xl">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>
        </div>
        <div class="flex-1">
            <h4 class="font-bold text-sm" id="toast-titolo">Titolo</h4>
            <p class="text-xs text-emerald-100 mt-0.5" id="toast-messaggio">Messaggio</p>
        </div>
    </div>

    <main class="w-full max-w-md mx-auto flex-grow flex flex-col justify-center gap-6 py-4">
        <div class="text-center">
            <span class="text-xs font-bold uppercase tracking-widest text-sky-400 bg-sky-500/10 px-3 py-1 rounded-full border border-sky-500/20">Badge Aziendale</span>
            <h1 class="text-3xl font-black text-white mt-2 tracking-tight" id="nome-dipendente">Caricamento...</h1>
            <p id="stato-gps" class="text-xs text-amber-400 mt-1 flex items-center justify-center gap-1.5">
                <span class="h-2 w-2 rounded-full bg-amber-500 animate-pulse"></span> Ricerca posizione GPS...
            </p>
        </div>

        <div class="bg-slate-800/40 border border-slate-700/50 rounded-3xl p-6 text-center backdrop-blur-md shadow-inner">
            <div id="orologio-ora" class="text-5xl font-mono font-black text-white tracking-normal select-none">00:00:00</div>
            <div id="orologio-data" class="text-xs font-bold text-slate-400 uppercase tracking-wider mt-2">...</div>
        </div>

        <div class="flex flex-col gap-4">
            <button onclick="timbra('INGRESSO')" class="group relative w-full bg-emerald-600 hover:bg-emerald-500 active:scale-[0.98] text-white p-5 rounded-2xl font-extrabold text-xl tracking-wide shadow-lg shadow-emerald-900/30 border border-emerald-500 transition-all flex items-center justify-between overflow-hidden">
                <div class="flex items-center gap-4 z-10">
                    <span class="bg-white/10 p-2.5 rounded-xl border border-white/10">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 16l-4-4m0 0l4-4m-4 4h14" /></svg>
                    </span>
                    <span>INIZIO LAVORO</span>
                </div>
                <span class="text-xs font-bold bg-emerald-700/60 border border-emerald-400/30 px-3 py-1 rounded-lg z-10">IN</span>
            </button>

            <button onclick="timbra('USCITA')" class="group relative w-full bg-rose-600 hover:bg-rose-500 active:scale-[0.98] text-white p-5 rounded-2xl font-extrabold text-xl tracking-wide shadow-lg shadow-rose-900/30 border border-rose-500 transition-all flex items-center justify-between overflow-hidden">
                <div class="flex items-center gap-4 z-10">
                    <span class="bg-white/10 p-2.5 rounded-xl border border-white/10">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7" /></svg>
                    </span>
                    <span>FINE LAVORO</span>
                </div>
                <span class="text-xs font-bold bg-rose-700/60 border border-rose-400/30 px-3 py-1 rounded-lg z-10">OUT</span>
            </button>
        </div>
    </main>

    <footer class="w-full max-w-sm mx-auto text-center border-t border-slate-800/60 pt-4 pb-2">
        <p class="text-xs text-slate-500">Recinto GPS & Limite 1 Timbratura per Turno</p>
    </footer>

    <script>
        const SUPABASE_URL = 'https://gwvzrpuzhxvbxemdqapn.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OmznfN1ZKY_2wkvW-LMtpA_5ITT0Q1B';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const AZIENDA_LAT = 46.011914; 
        const AZIENDA_LON = 11.925732; 
        const RAGGIO_MASSIMO_METRI = 50; 

        // Definizione rigida delle finestre con orari iso di inizio e fine
        const FINESTRE_ORARIE = {
            MATTINA: {
                inizio: "06:30",
                fine: "14:00",
                in_inizio: "06:30", in_fine: "09:00",
                out_inizio: "12:00", out_fine: "14:00"
            },
            POMERIGGIO: {
                inizio: "13:45",
                fine: "20:30",
                in_inizio: "13:45", in_fine: "16:00",
                out_inizio: "18:30", out_fine: "20:30"
            }
        };

        let dipendenteId = null;
        let gpsLatitudine = null;
        let gpsLongitudine = null;
        let gpsPronto = false;

        function aggiornaOrologio() {
            const adesso = new Date();
            document.getElementById('orologio-ora').innerText = adesso.toLocaleTimeString('it-IT');
            document.getElementById('orologio-data').innerText = adesso.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(aggiornaOrologio, 1000);
        aggiornaOrologio();

        function calcolaDistanzaMetri(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const p1 = lat1 * Math.PI / 180;
            const p2 = lat2 * Math.PI / 180;
            const deltaP = (lat2 - lat1) * Math.PI / 180;
            const deltaL = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(deltaP/2) * Math.sin(deltaP/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(deltaL/2) * Math.sin(deltaL/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))); 
        }

        function avviaMonitoraggioGPS() {
            if (!navigator.geolocation) {
                document.getElementById('stato-gps').innerHTML = "❌ GPS non supportato";
                return;
            }
            navigator.geolocation.watchPosition(
                (position) => {
                    gpsLatitudine = position.coords.latitude;
                    gpsLongitudine = position.coords.longitude;
                    gpsPronto = true;
                    const dist = calcolaDistanzaMetri(gpsLatitudine, gpsLongitudine, AZIENDA_LAT, AZIENDA_LON);
                    if(dist <= RAGGIO_MASSIMO_METRI) {
                        document.getElementById('stato-gps').innerHTML = `<span class="h-2 w-2 rounded-full bg-emerald-500 animate-ping"></span> Posizione Idonea (${Math.round(dist)}m)`;
                        document.getElementById('stato-gps').className = "text-xs text-emerald-400 mt-1 flex items-center justify-center gap-1.5";
                    } else {
                        document.getElementById('stato-gps').innerHTML = `❌ Fuori zona aziendale (${Math.round(dist)}m)`;
                        document.getElementById('stato-gps').className = "text-xs text-rose-400 font-bold mt-1 flex items-center justify-center gap-1.5";
                    }
                },
                (error) => {
                    gpsPronto = false;
                    document.getElementById('stato-gps').innerHTML = "❌ Attiva il GPS e ricarica";
                    document.getElementById('stato-gps').className = "text-xs text-rose-500 font-bold mt-1 flex items-center justify-center gap-1.5";
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        async function verificaAccessoEIdentita() {
            const parametriUrl = new URLSearchParams(window.location.search);
            const idUrl = parametriUrl.get('id');
            
            if (idUrl) {
                localStorage.setItem('badge_dipendente_id', idUrl);
                dipendenteId = idUrl;
            } else {
                dipendenteId = localStorage.getItem('badge_dipendente_id');
            }

            if (!dipendenteId) {
                mostraErroreCritico("Link non valido", "Codice dipendente mancante nell'applicazione.");
                return;
            }

            try {
                const { data: dipendente, error } = await supabaseClient
                    .from('dipendenti')
                    .select('nome, cognome')
                    .eq('id', dipendenteId)
                    .single();
                
                if (error || !dipendente) {
                    localStorage.removeItem('badge_dipendente_id'); 
                    throw new Error();
                }
                
                document.getElementById('nome-dipendente').innerText = `${dipendente.nome} ${dipendente.cognome}`;
                document.getElementById('loading-screen').classList.add('opacity-0');
                
                setTimeout(() => { 
                    document.getElementById('loading-screen').classList.add('hidden'); 
                    avviaMonitoraggioGPS(); 
                }, 300);

            } catch (err) {
                mostraErroreCritico("Errore Database", "Dipendente non trovato.");
            }
        }

        function mostraErroreCritico(titolo, messaggio) {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('error-titolo').innerText = titolo;
            document.getElementById('error-messaggio').innerText = messaggio;
            document.getElementById('error-screen').classList.remove('hidden');
        }

        function mostraNotificaPopUp(tipo, titoloStr, messaggioStr) {
            const toast = document.getElementById('success-toast');
            document.getElementById('toast-titolo').innerText = titoloStr;
            document.getElementById('toast-messaggio').innerText = messaggioStr;

            if(tipo === 'SUCCESS_IN') toast.className = "fixed top-4 inset-x-4 max-w-sm mx-auto bg-emerald-600 text-white p-4 rounded-2xl shadow-2xl border border-emerald-500 transition-all duration-500 z-50 flex items-center gap-3";
            else if(tipo === 'SUCCESS_OUT') toast.className = "fixed top-4 inset-x-4 max-w-sm mx-auto bg-rose-600 text-white p-4 rounded-2xl shadow-2xl border border-rose-500 transition-all duration-500 z-50 flex items-center gap-3";
            else toast.className = "fixed top-4 inset-x-4 max-w-sm mx-auto bg-amber-600 text-white p-4 rounded-2xl shadow-2xl border border-amber-500 transition-all duration-500 z-50 flex items-center gap-3";

            toast.classList.remove('-translate-y-32', 'opacity-0');
            setTimeout(() => { toast.classList.add('-translate-y-32', 'opacity-0'); }, 4500);
        }

        function stringaInMinuti(orarioStr) {
            const parti = orarioStr.split(':');
            return parseInt(parti[0], 10) * 60 + parseInt(parti[1], 10);
        }

        async function timbra(tipoAzione) {
            if (!dipendenteId) return;

            if (!gpsPronto || gpsLatitudine === null) {
                mostraNotificaPopUp('ERRORE', "Errore GPS ❌", "Posizione in calcolo o negata.");
                return;
            }
            if (calcolaDistanzaMetri(gpsLatitudine, gpsLongitudine, AZIENDA_LAT, AZIENDA_LON) > RAGGIO_MASSIMO_METRI) {
                mostraNotificaPopUp('ERRORE', "Fuori Zona ❌", "Devi essere in azienda per timbrare.");
                return;
            }

            const adesso = new Date();
            const giornoSettimana = adesso.getDay(); 
            const minutiAttuali = adesso.getHours() * 60 + adesso.getMinutes();
            const oraFormattata = adesso.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });

            if (giornoSettimana === 0) {
                mostraNotificaPopUp('ERRORE', "Azienda Chiusa ⛔", "Oggi è Domenica.");
                return;
            }

            // 1. Identificazione della fascia oraria corrente globale (Mattina o Pomeriggio)
            let fasciaCorrente = null;
            let orarioValido = false;

            // Controllo Finestra Mattina
            if (tipoAzione === 'INGRESSO' && minutiAttuali >= stringaInMinuti(FINESTRE_ORARIE.MATTINA.in_inizio) && minutiAttuali <= stringaInMinuti(FINESTRE_ORARIE.MATTINA.in_fine)) {
                fasciaCorrente = 'MATTINA';
                orarioValido = true;
            } else if (tipoAzione === 'USCITA' && minutiAttuali >= stringaInMinuti(FINESTRE_ORARIE.MATTINA.out_inizio) && minutiAttuali <= stringaInMinuti(FINESTRE_ORARIE.MATTINA.out_fine)) {
                fasciaCorrente = 'MATTINA';
                orarioValido = true;
            }

            // Controllo Finestra Pomeriggio (valida da Lunedì a Venerdì)
            if (!orarioValido && (giornoSettimana >= 1 && giornoSettimana <= 5)) {
                if (tipoAzione === 'INGRESSO' && minutiAttuali >= stringaInMinuti(FINESTRE_ORARIE.POMERIGGIO.in_inizio) && minutiAttuali <= stringaInMinuti(FINESTRE_ORARIE.POMERIGGIO.in_fine)) {
                    fasciaCorrente = 'POMERIGGIO';
                    orarioValido = true;
                } else if (tipoAzione === 'USCITA' && minutiAttuali >= stringaInMinuti(FINESTRE_ORARIE.POMERIGGIO.out_inizio) && minutiAttuali <= stringaInMinuti(FINESTRE_ORARIE.POMERIGGIO.out_fine)) {
                    fasciaCorrente = 'POMERIGGIO';
                    orarioValido = true;
                }
            }

            if (!orarioValido || !fasciaCorrente) {
                mostraNotificaPopUp('ERRORE', "Fuori Orario ⛔", `Nessun turno previsto per le ${oraFormattata}.`);
                return;
            }

            document.body.style.pointerEvents = 'none';

            try {
                // 2. CONTROLLO ANTI-DUPLICATO SU SUPABASE
                // Definiamo i timestamp di inizio e fine della fascia oraria odierna
                const inizioFascia = new Date(adesso);
                const [oraInizio, minInizio] = FINESTRE_ORARIE[fasciaCorrente].inizio.split(':');
                inizioFascia.setHours(parseInt(oraInizio), parseInt(minInizio), 0, 0);

                const fineFascia = new Date(adesso);
                const [oraFine, minFine] = FINESTRE_ORARIE[fasciaCorrente].fine.split(':');
                fineFascia.setHours(parseInt(oraFine), parseInt(minFine), 59, 999);

                // Interroghiamo la tabella per vedere se esiste già quel tipo_azione in questa fascia
                const { data: timbratureEsistenti, error: errorCheck } = await supabaseClient
                    .from('timbrature')
                    .select('id')
                    .eq('dipendente_id', dipendenteId)
                    .eq('tipo_azione', tipoAzione)
                    .gte('orario', inizioFascia.toISOString())
                    .lte('orario', fineFascia.toISOString());

                if (errorCheck) throw errorCheck;

                if (timbratureEsistenti && timbratureEsistenti.length > 0) {
                    mostraNotificaPopUp('ERRORE', "Già Registrato ⚠️", `Hai già effettuato un ${tipoAzione} per il turno di questa ${fasciaCorrente.toLowerCase()}.`);
                    document.body.style.pointerEvents = 'auto';
                    return;
                }

                // 3. ESECUZIONE DELLA TIMBRATURA (Se il controllo è superato)
                const { error } = await supabaseClient.from('timbrature').insert({
                    dipendente_id: dipendenteId,
                    tipo_azione: tipoAzione,
                    orario: adesso.toISOString(),
                    latitudine: gpsLatitudine,
                    longitudine: gpsLongitudine
                });
                
                if (error) throw error;
                mostraNotificaPopUp(tipoAzione === 'INGRESSO' ? 'SUCCESS_IN' : 'SUCCESS_OUT', 
                    tipoAzione === 'INGRESSO' ? "Buon Lavoro!" : "Fine Turno", 
                    `Registrato alle ${oraFormattata}.`);
            } catch (err) {
                console.error(err);
                mostraNotificaPopUp('ERRORE', "Errore di Rete", "Impossibile completare la verifica o il salvataggio.");
            } finally {
                document.body.style.pointerEvents = 'auto';
            }
        }

        window.onload = verificaAccessoEIdentita;
    </script>
</body>
</html>
