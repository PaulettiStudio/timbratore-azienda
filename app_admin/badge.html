<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest-badge.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/128/16999/16999629.png">
    <title>Badge Aziendale</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-4">

    <div id="loading" class="fixed inset-0 bg-slate-900 flex flex-col items-center justify-center z-50">
        <div class="animate-spin h-10 w-10 border-4 border-t-sky-500 rounded-full"></div>
    </div>

    <main class="w-full max-w-sm flex flex-col gap-6 mt-10">
        <h1 id="nome-dipendente" class="text-2xl font-bold text-center">Caricamento...</h1>
        <div id="orologio" class="text-4xl font-mono text-center bg-slate-800 p-6 rounded-2xl">00:00:00</div>
        
        <button onclick="timbra('INGRESSO')" class="bg-emerald-600 p-4 rounded-xl font-bold">INIZIO LAVORO</button>
        <button onclick="timbra('USCITA')" class="bg-rose-600 p-4 rounded-xl font-bold">FINE LAVORO</button>
    </main>

    <script>
        const supabase = supabase.createClient('https://gwvzrpuzhxvbxemdqapn.supabase.co', 'sb_publishable_OmznfN1ZKY_2wkvW-LMtpA_5ITT0Q1B');
        let dipendenteId = new URLSearchParams(window.location.search).get('id');

        // Logica di salvataggio "Blindata"
        if (dipendenteId) {
            localStorage.setItem('id_utente', dipendenteId);
        } else {
            dipendenteId = localStorage.getItem('id_utente');
        }

        async function init() {
            if (!dipendenteId) {
                alert("Errore: ID mancante. Riapri il link originale.");
                return;
            }
            
            const { data, error } = await supabase.from('dipendenti').select('nome').eq('id', dipendenteId).single();
            if (error) {
                document.body.innerHTML = "<h2 class='text-center mt-20'>Utente non trovato. Contatta l'admin.</h2>";
            } else {
                document.getElementById('nome-dipendente').innerText = "Ciao, " + data.nome;
                document.getElementById('loading').classList.add('hidden');
            }
        }

        // Funzione timbratura (inserisci qui la tua logica di inserimento)
        async function timbra(tipo) {
            alert("Timbratura " + tipo + " inviata per: " + dipendenteId);
        }

        setInterval(() => {
            document.getElementById('orologio').innerText = new Date().toLocaleTimeString();
        }, 1000);

        init();
    </script>
</body>
</html>
