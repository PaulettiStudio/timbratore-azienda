<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timbratura...</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">

    <!-- MESSAGGIO DI ATTESA -->
    <div id="loading" class="text-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-emerald-500 mx-auto mb-4"></div>
        <p class="text-slate-400 text-sm font-bold animate-pulse">Registrazione in corso...</p>
    </div>

    <!-- MESSAGGIO DI CONFERMA (HIDDEN ALL'INIZIO) -->
    <div id="conferma" class="hidden text-center w-full max-w-sm bg-slate-900 border border-slate-700 p-8 rounded-3xl shadow-2xl">
        <div class="text-5xl mb-4">✅</div>
        <h2 class="text-xl font-black text-emerald-400 mb-1">Timbratura Effettuata</h2>
        <p class="text-slate-400 text-xs uppercase font-bold tracking-widest mb-6">Ingresso registrato con successo</p>
        
        <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 text-left">
            <div class="flex justify-between mb-2">
                <span class="text-[10px] text-slate-500 font-bold uppercase">Data</span>
                <span id="txt-data" class="text-sm font-mono font-bold">--/--/----</span>
            </div>
            <div class="flex justify-between">
                <span class="text-[10px] text-slate-500 font-bold uppercase">Ora</span>
                <span id="txt-ora" class="text-sm font-mono font-bold">--:--</span>
            </div>
        </div>
        
        <button onclick="window.close()" class="mt-8 w-full bg-slate-700 hover:bg-slate-600 py-3 rounded-xl text-sm font-bold transition">Chiudi</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://gwvzrpuzhxvbxemdqapn.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OmznfN1ZKY_2wkvW-LMtpA_5ITT0Q1B';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function eseguiTimbratura() {
            const urlParams = new URLSearchParams(window.location.search);
            const dipId = urlParams.get('id');
            const now = new Date();

            if (!dipId) {
                document.getElementById('loading').innerHTML = '<p class="text-rose-500">Errore: ID non trovato.</p>';
                return;
            }

            try {
                const { error } = await supabaseClient.from('timbrature').insert({
                    dipendente_id: dipId,
                    orario: now.toISOString(),
                    tipo_azione: 'INGRESSO',
                    latitudine: 0,
                    longitudine: 0
                });

                if (error) throw error;

                // Aggiorna UI
                document.getElementById('txt-data').innerText = now.toLocaleDateString('it-IT');
                document.getElementById('txt-ora').innerText = now.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('conferma').classList.remove('hidden');

            } catch (err) {
                document.getElementById('loading').innerHTML = `<p class="text-rose-500">Errore server. Riprova.</p>`;
            }
        }

        window.onload = eseguiTimbratura;
    </script>
</body>
</html>
