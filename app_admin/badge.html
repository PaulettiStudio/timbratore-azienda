<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badge Presenze</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex flex-col items-center justify-center min-h-screen p-4">

    <div id="status" class="text-xl font-bold mb-8">Inizializzazione...</div>

    <div id="controls" class="hidden w-full max-w-sm flex flex-col gap-4">
        <button onclick="inviaTimbratura('INGRESSO')" class="bg-emerald-600 p-6 rounded-2xl font-black text-xl">INGRESSO</button>
        <button onclick="timbra('USCITA')" class="bg-rose-600 p-6 rounded-2xl font-black text-xl">USCITA</button>
    </div>

    <script>
        const supabase = supabase.createClient(
            'https://gwvzrpuzhxvbxemdqapn.supabase.co', 
            'sb_publishable_OmznfN1ZKY_2wkvW-LMtpA_5ITT0Q1B'
        );

        async function avvia() {
            const params = new URLSearchParams(window.location.search);
            let id = params.get('id');

            if (!id) id = localStorage.getItem('id_utente');
            if (!id) {
                document.getElementById('status').innerText = "ERRORE: ID non trovato";
                return;
            }
            
            localStorage.setItem('id_utente', id);
            
            // Recupero Nome
            const { data, error } = await supabase.from('dipendenti').select('nome').eq('id', id).single();
            
            if (error) {
                document.getElementById('status').innerText = "Errore Database: " + error.message;
            } else {
                document.getElementById('status').innerText = "Ciao, " + data.nome;
                document.getElementById('controls').classList.remove('hidden');
            }
        }

        async function inviaTimbratura(tipo) {
            const id = localStorage.getItem('id_utente');
            const { error } = await supabase.from('timbrature').insert({
                dipendente_id: id,
                tipo_azione: tipo,
                orario: new Date().toISOString()
            });
            
            if (error) alert("Errore invio: " + error.message);
            else alert("Timbratura effettuata!");
        }

        avvia();
    </script>
</body>
</html>
