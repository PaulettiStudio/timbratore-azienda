    <script>
        // CONFIGURAZIONE SUPABASE
        const SUPABASE_URL = 'https://gwvzrpuzhxvbxemdqapn.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OmznfN1ZKY_2wkvW-LMtpA_5ITT0Q1B';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let timbratureGlobali = []; 
        let dipendentiGlobali = [];
        let timbratureFiltrate = [];
        let vistaAttiva = 'calendario';
        let idInModifica = null;

        const oggiIniziale = new Date();
        document.getElementById('filtro-mese').value = oggiIniziale.toISOString().substring(0, 7);

        function apriLabel(idLabel, bottone) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(idLabel).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-sky-600', 'text-white');
                btn.classList.add('text-slate-400');
            });
            bottone.classList.remove('text-slate-400');
            bottone.classList.add('bg-sky-600', 'text-white');
        }

        function cambiaVista(tipo) {
            vistaAttiva = tipo;
            const btnCal = document.getElementById('btn-vista-calendario');
            const btnReg = document.getElementById('btn-vista-registro');
            const sezCal = document.getElementById('sezione-vista-calendario');
            const sezReg = document.getElementById('sezione-vista-registro');

            if (tipo === 'calendario') {
                btnCal.classList.add('bg-slate-700', 'text-white'); btnCal.classList.remove('text-slate-400');
                btnReg.classList.remove('bg-slate-700', 'text-white'); btnReg.classList.add('text-slate-400');
                sezCal.classList.remove('hidden'); sezReg.classList.add('hidden');
            } else {
                btnReg.classList.add('bg-slate-700', 'text-white'); btnReg.classList.remove('text-slate-400');
                btnCal.classList.remove('bg-slate-700', 'text-white'); btnCal.classList.add('text-slate-400');
                sezReg.classList.remove('hidden'); sezCal.classList.add('hidden');
            }
        }

        function toggleDurataExtra() {
            const val = document.querySelector('input[name="manual-azione"]:checked').value;
            const container = document.getElementById('container-durata-extra');
            if(val === 'FERIE' || val === 'PERMESSO') container.classList.remove('hidden');
            else container.classList.add('hidden');
        }

        function toggleEditDurata() {
            const val = document.getElementById('edit-azione').value;
            const container = document.getElementById('edit-container-durata');
            if(val === 'FERIE' || val === 'PERMESSO') container.classList.remove('hidden');
            else container.classList.add('hidden');
        }

        function analizzaTipoAzione(tipoGrezzo) {
            if (tipoGrezzo.includes(':')) {
                let parti = tipoGrezzo.split(':');
                return { tipo: parti[0], ore: parseFloat(parti[1]) };
            }
            return { tipo: tipoGrezzo, ore: 8 };
        }

        function arrotondaAi15Minuti(dataIso) {
            let d = new Date(dataIso);
            let m = d.getMinutes();
            let resto = m % 15;
            let arrot = resto >= 7 ? m + (15 - resto) : m - resto;
            
            if (arrot === 60) { d.setHours(d.getHours() + 1); d.setMinutes(0); } 
            else { d.setMinutes(arrot); }
            d.setSeconds(0, 0);
            return d;
        }

        function formattaOra(d) { return d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' }); }
        function getInizioSettimana(d) {
            let date = new Date(d);
            let day = date.getDay();
            let diff = date.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(date.setDate(diff)).toISOString().split('T')[0];
        }

        async function caricaDati() {
            try {
                const { data: dipendenti, error: dErr } = await supabaseClient.from('dipendenti').select('*').order('cognome');
                if (dErr) throw dErr;
                dipendentiGlobali = dipendenti;
                aggiornaSelettoriMenu();

                const { data: timbrature, error: tErr } = await supabaseClient
                    .from('timbrature')
                    .select('id, orario, tipo_azione, dipendente_id, dipendenti(nome, cognome)')
                    .order('orario', { ascending: false });

                if (tErr) throw tErr;
                timbratureGlobali = timbrature;
                
                filtraERenderizza();
            } catch (err) {
                console.error("Errore di rete:", err);
            }
        }

        function aggiornaSelettoriMenu() {
            const filtroDip = document.getElementById('filtro-dipendente');
            const manualDip = document.getElementById('manual-dipendente');
            const editDip = document.getElementById('edit-dipendente');
            const containerLista = document.getElementById('lista-dipendenti');

            filtroDip.innerHTML = '<option value="tutti">Tutti i dipendenti</option>';
            manualDip.innerHTML = '<option value="">-- Scegli --</option>';
            editDip.innerHTML = '';
            containerLista.innerHTML = '';

            dipendentiGlobali.forEach(d => {
                const optText = `${d.cognome} ${d.nome}`;
                filtroDip.innerHTML += `<option value="${d.id}">${optText}</option>`;
                manualDip.innerHTML += `<option value="${d.id}">${optText}</option>`;
                editDip.innerHTML += `<option value="${d.id}">${optText}</option>`;

                const pb = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
                const linkBadge = `${window.location.origin}${pb}badge.html?id=${d.id}`;

                containerLista.innerHTML += `
                    <div class="bg-slate-800 border border-slate-700 rounded-xl p-3 shadow-sm">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-bold text-sm text-slate-200">${d.cognome} ${d.nome}</span>
                            <button onclick="navigator.clipboard.writeText('${linkBadge}'); alert('Copiato!');" class="text-[11px] bg-slate-700 text-sky-400 px-2 py-0.5 rounded font-bold">Copia</button>
                        </div>
                        <div class="text-[10px] text-slate-500 font-mono break-all bg-slate-900/50 p-1.5 rounded border border-slate-800">${linkBadge}</div>
                    </div>
                `;
            });
        }

        function filtraERenderizza() {
            const dipId = document.getElementById('filtro-dipendente').value;
            const meseFiltro = document.getElementById('filtro-mese').value; 

            timbratureFiltrate = timbratureGlobali.filter(t => {
                let mDip = true; let mMese = true;
                if (dipId !== 'tutti') {
                    const recId = t.dipendente_id || (t.dipendenti ? t.dipendenti.id : null);
                    mDip = String(recId) === String(dipId);
                }
                if (meseFiltro) {
                    mMese = t.orario.substring(0, 7) === meseFiltro;
                }
                return mDip && mMese;
            });

            calcolaEVisualizzaMetriche(dipId, meseFiltro);
            renderizzaCalendarioFisico(dipId, meseFiltro);
            renderizzaListaMovimentiSotto();
        }

        function calcolaEVisualizzaMetriche(dipId, meseFiltro) {
            if (dipId === 'tutti') {
                document.getElementById('ore-oggi').innerText = '-';
                document.getElementById('ore-settimana').innerText = '-';
                document.getElementById('ore-mese').innerText = '-';
                return;
            }

            let totOggi = 0; let totSettimana = 0; let totMese = 0;
            const oggiStr = new Date().toISOString().split('T')[0];
            const inizioSettimanaStr = getInizioSettimana(new Date());

            let oreDelDipendente = timbratureGlobali.filter(t => {
                const recId = t.dipendente_id || (t.dipendenti ? t.dipendenti.id : null);
                return String(recId) === String(dipId);
            });

            oreDelDipendente.sort((a, b) => new Date(a.orario) - new Date(b.orario));
            let ultimoIn = null;

            oreDelDipendente.forEach(t => {
                let dataObj = new Date(t.orario);
                let dStr = dataObj.toISOString().split('T')[0];
                let sStr = getInizioSettimana(dataObj);
                let mStr = t.orario.substring(0, 7);

                let info = analizzaTipoAzione(t.tipo_azione);
                let oreAggiunte = 0;

                if (info.tipo === 'INGRESSO') {
                    ultimoIn = t;
                } else if (info.tipo === 'USCITA') {
                    if (ultimoIn) {
                        let diff = arrotondaAi15Minuti(t.orario) - arrotondaAi15Minuti(ultimoIn.orario);
                        if (diff > 0) oreAggiunte = diff / (1000 * 60 * 60);
                        ultimoIn = null;
                    }
                } else if (info.tipo === 'FERIE' || info.tipo === 'PERMESSO') {
                    oreAggiunte = info.ore; 
                }

                if (oreAggiunte > 0) {
                    if (dStr === oggiStr) totOggi += oreAggiunte;
                    if (sStr === inizioSettimanaStr) totSettimana += oreAggiunte;
                    if (mStr === meseFiltro) totMese += oreAggiunte;
                }
            });

            document.getElementById('ore-oggi').innerText = totOggi.toFixed(1) + 'h';
            document.getElementById('ore-settimana').innerText = totSettimana.toFixed(1) + 'h';
            document.getElementById('ore-mese').innerText = totMese.toFixed(1) + 'h';
        }

        // GRIGLIA CALENDARIO - RISOLTO: MOSTRA "-" SE E' SELEZIONATO "TUTTI I DIPENDENTI"
        function renderizzaCalendarioFisico(dipIdScelto, meseSceltoStr) {
            const griglia = document.getElementById('griglia-calendario-fisico');
            griglia.innerHTML = '';
            if(!meseSceltoStr) return;

            const [anno, mese] = meseSceltoStr.split('-').map(Number);
            document.getElementById('nome-mese-titolo').innerText = new Date(anno, mese - 1, 1).toLocaleDateString('it-IT', { month: 'long', year: 'numeric' });

            const ggTotali = new Date(anno, mese, 0).getDate();
            let ggStart = new Date(anno, mese - 1, 1).getDay();
            ggStart = ggStart === 0 ? 6 : ggStart - 1;

            let orePerGiorno = {};
            let tipoDay = {};
            const mostraTotaleCasella = (dipIdScelto !== 'tutti'); // Flag sicurezza

            // Calcolo interno sempre, ma visualizzazione condizionata
            let logicaDip = {};
            timbratureFiltrate.forEach(t => {
                let dId = t.dipendente_id || 'unkn';
                if(!logicaDip[dId]) logicaDip[dId] = [];
                logicaDip[dId].push(t);
            });

            for(let dId in logicaDip) {
                logicaDip[dId].sort((a,b) => new Date(a.orario) - new Date(b.orario));
                let inPres = null;
                logicaDip[dId].forEach(r => {
                    let gNum = new Date(r.orario).getDate();
                    if(!orePerGiorno[gNum]) orePerGiorno[gNum] = 0;
                    let info = analizzaTipoAzione(r.tipo_azione);

                    if(info.tipo === 'INGRESSO') inPres = r;
                    else if(info.tipo === 'USCITA' && inPres) {
                        let diff = arrotondaAi15Minuti(r.orario) - arrotondaAi15Minuti(inPres.orario);
                        if(diff > 0) orePerGiorno[gNum] += diff / (1000*60*60);
                        inPres = null;
                    } else if(info.tipo === 'FERIE' || info.tipo === 'PERMESSO') {
                        orePerGiorno[gNum] += info.ore; 
                        tipoDay[gNum] = info.tipo;
                    }
                });
            }

            for (let i = 0; i < ggStart; i++) {
                griglia.innerHTML += `<div class="bg-slate-900/20 border border-transparent h-14 rounded-lg"></div>`;
            }

            for (let g = 1; g <= ggTotali; g++) {
                let oreTot = orePerGiorno[g] || 0;
                let str = ''; let col = 'text-sky-400';

                // Se ho selezionato "Tutti" e ci sono ore in questo giorno, mostro un "-" (Niente somme assurde)
                if (!mostraTotaleCasella && oreTot > 0) {
                    str = '-';
                    col = 'text-slate-500';
                } 
                // Se ho selezionato UN dipendente, mostro il monte ore suo
                else if (mostraTotaleCasella && oreTot > 0) {
                    str = `${oreTot.toFixed(1)}h`;
                    if(tipoDay[g] === 'FERIE') col = 'text-amber-400 font-bold';
                    if(tipoDay[g] === 'PERMESSO') col = 'text-indigo-400 font-bold';
                }

                griglia.innerHTML += `
                    <div class="bg-slate-900/60 border border-slate-700/60 h-14 rounded-xl p-1 flex flex-col justify-between shadow-inner">
                        <span class="text-[10px] font-bold text-slate-400">${g}</span>
                        <span class="text-[10px] font-mono text-right ${col} mt-auto tracking-tighter">${str}</span>
                    </div>
                `;
            }
        }

        function renderizzaListaMovimentiSotto() {
            const container = document.getElementById('contenitore-lista-movimenti');
            if (timbratureFiltrate.length === 0) {
                container.innerHTML = '<p class="text-center text-xs text-slate-500 py-4">Nessun movimento trovato.</p>';
                return;
            }
            container.innerHTML = '';
            
            timbratureFiltrate.forEach(t => {
                const dataReale = new Date(t.orario);
                const info = analizzaTipoAzione(t.tipo_azione);
                
                const giornoStr = dataReale.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
                const oraReale = formattaOra(dataReale);
                const nome = t.dipendenti ? `${t.dipendenti.nome} ${t.dipendenti.cognome}` : 'Risorsa';
                
                let colore = 'text-emerald-400 bg-emerald-400/10 border-emerald-500/10';
                let oraCalcolata = formattaOra(arrotondaAi15Minuti(t.orario));

                if(info.tipo === 'USCITA') colore = 'text-rose-400 bg-rose-400/10 border-rose-500/10';
                if(info.tipo === 'FERIE') { colore = 'text-amber-400 bg-amber-400/10 border-amber-500/10'; oraCalcolata = `${info.ore}h`; }
                if(info.tipo === 'PERMESSO') { colore = 'text-indigo-400 bg-indigo-400/10 border-indigo-500/10'; oraCalcolata = `${info.ore}h`; }

                container.innerHTML += `
                    <div class="bg-slate-900/50 border border-slate-700/40 rounded-xl p-2.5 flex justify-between items-center text-xs gap-2">
                        <div class="flex-1">
                            <span class="font-bold text-slate-200 block">${nome}</span>
                            <span class="text-[10px] text-slate-400">${giornoStr} - <span class="font-mono">Reale: ${oraReale}</span></span>
                            <div class="mt-1">
                                <span class="px-1.5 py-0.5 rounded border text-[9px] font-bold ${colore}">${info.tipo}</span>
                                <span class="font-mono text-sky-400 font-bold ml-1">${oraCalcolata}</span>
                            </div>
                        </div>
                        <div>
                            <button onclick="apriModaleEdit('${t.id}')" class="bg-sky-600/20 border border-sky-500/30 text-sky-400 hover:bg-sky-600 hover:text-white px-3 py-2 rounded-lg transition text-[10px] font-bold shadow-sm">
                                ✏️ Modifica
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // --- SISTEMA DI MODIFICA TOTALE E CANCELLAZIONE ---
        function apriModaleEdit(id) {
            idInModifica = id;
            const t = timbratureGlobali.find(x => x.id === id);
            
            // Popola Dipendente
            let recId = t.dipendente_id || (t.dipendenti ? t.dipendenti.id : null);
            document.getElementById('edit-dipendente').value = recId;
            
            // Popola Azione e Ore
            const info = analizzaTipoAzione(t.tipo_azione);
            document.getElementById('edit-azione').value = info.tipo;
            document.getElementById('edit-ore').value = info.ore;
            toggleEditDurata();

            // Popola Orario col fuso corretto
            let d = new Date(t.orario);
            d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
            document.getElementById('edit-nuovo-orario').value = d.toISOString().slice(0, 16);
            
            document.getElementById('modale-edit').classList.remove('hidden');
        }

        function chiudiModaleEdit() {
            idInModifica = null;
            document.getElementById('modale-edit').classList.add('hidden');
        }

        async function salvaModificaOrario() {
            const nuovoDipId = document.getElementById('edit-dipendente').value;
            const azioneBase = document.getElementById('edit-azione').value;
            const oreCustom = document.getElementById('edit-ore').value || 8;
            const dataGrezza = document.getElementById('edit-nuovo-orario').value;
            
            if(!dataGrezza || !nuovoDipId) return;

            let azioneFinale = azioneBase;
            if(azioneBase === 'FERIE' || azioneBase === 'PERMESSO') {
                azioneFinale = `${azioneBase}:${oreCustom}`;
            }

            const nuovoOrarioISO = new Date(dataGrezza).toISOString();

            try {
                const { error } = await supabaseClient.from('timbrature').update({ 
                    dipendente_id: nuovoDipId,
                    orario: nuovoOrarioISO,
                    tipo_azione: azioneFinale 
                }).eq('id', idInModifica);
                
                if (error) throw error;
                chiudiModaleEdit();
                await caricaDati();
            } catch (err) {
                alert("Errore durante il salvataggio della modifica.");
            }
        }

        async function eliminaRecord() {
            if (!confirm("ATTENZIONE: Questa azione è irreversibile. Sei sicuro di voler eliminare questo record?")) return;
            
            try {
                const { error } = await supabaseClient.from('timbrature').delete().eq('id', idInModifica);
                if (error) throw error;
                chiudiModaleEdit();
                await caricaDati();
            } catch (err) {
                alert("Errore durante l'eliminazione.");
            }
        }
        // ----------------------------------

        function resetFiltri() {
            document.getElementById('filtro-dipendente').value = 'tutti';
            document.getElementById('filtro-mese').value = new Date().toISOString().substring(0, 7);
            filtraERenderizza();
        }

        async function aggiungiTimbraturaManuale() {
            const dipIdStr = document.getElementById('manual-dipendente').value;
            const orarioStr = document.getElementById('manual-orario').value;
            let azioneSel = document.querySelector('input[name="manual-azione"]:checked').value;

            if (!dipIdStr || !orarioStr) { alert("Compila Dipendente e Orario."); return; }
            
            if (azioneSel === 'FERIE' || azioneSel === 'PERMESSO') {
                const oreCustom = document.getElementById('manual-ore').value || 8;
                azioneSel = `${azioneSel}:${oreCustom}`;
            }

            const orarioISO = new Date(orarioStr).toISOString();

            try {
                const { error } = await supabaseClient.from('timbrature').insert({
                    dipendente_id: dipIdStr,
                    orario: orarioISO,
                    tipo_azione: azioneSel,
                    latitudine: 0,
                    longitudine: 0
                });
                if (error) throw error;

                alert("Inserimento salvato con successo.");
                document.getElementById('manual-orario').value = '';
                await caricaDati();
                apriLabel('label-timbrature', document.querySelectorAll('.tab-btn')[0]);
            } catch (err) {
                console.error(err); alert("Errore di inserimento.");
            }
        }

        function generaPDF() {
            if (timbratureFiltrate.length === 0) { alert("Nessun record da esportare."); return; }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFontSize(18); doc.text("Registro Presenze Contabilizzato", 14, 20);
            doc.setFontSize(9);
            const selD = document.getElementById('filtro-dipendente');
            const dipTxt = selD.value === 'tutti' ? "Tutti i Dipendenti" : selD.options[selD.selectedIndex].text;
            doc.text(`Risorsa: ${dipTxt}  |  Periodo: ${document.getElementById('filtro-mese').value}`, 14, 26);

            let totLavoro = 0; let totFerie = 0; let totPermessi = 0;
            let logicaPDF = {};

            timbratureFiltrate.forEach(t => {
                let dId = t.dipendente_id || 'unkn';
                if(!logicaPDF[dId]) logicaPDF[dId] = [];
                logicaPDF[dId].push(t);
            });

            for(let dId in logicaPDF){
                logicaPDF[dId].sort((a,b) => new Date(a.orario) - new Date(b.orario));
                let uIn = null;
                logicaPDF[dId].forEach(r => {
                    let info = analizzaTipoAzione(r.tipo_azione);
                    if(info.tipo === 'INGRESSO') uIn = r;
                    else if(info.tipo === 'USCITA' && uIn) {
                        let diff = arrotondaAi15Minuti(r.orario) - arrotondaAi15Minuti(uIn.orario);
                        if(diff > 0) totLavoro += diff / (1000*60*60);
                        uIn = null;
                    } 
                    else if(info.tipo === 'FERIE') totFerie += info.ore;
                    else if(info.tipo === 'PERMESSO') totPermessi += info.ore;
                });
            }

            const righeTabella = timbratureFiltrate.map(t => {
                const info = analizzaTipoAzione(t.tipo_azione);
                const dR = new Date(t.orario);
                const data = dR.toLocaleDateString('it-IT');
                const n = t.dipendenti ? `${t.dipendenti.nome} ${t.dipendenti.cognome}` : 'Ignoto';
                let c = formattaOra(arrotondaAi15Minuti(t.orario));
                
                if(info.tipo === 'FERIE' || info.tipo === 'PERMESSO') c = `${info.ore}h Compute`;
                return [data, n, info.tipo, c, `(${formattaOra(dR)})`];
            });

            doc.autoTable({ startY: 33, head: [['Data', 'Dipendente', 'Evento', 'Computo', 'Scansione']], body: righeTabella, headStyles: { fillColor: [2, 132, 199] } });

            if(selD.value !== 'tutti') {
                let fineT = doc.lastAutoTable.finalY || 40;
                doc.setFontSize(12); doc.text("RIEPILOGO TOTALI DIPENDENTE", 14, fineT + 12);
                doc.autoTable({
                    startY: fineT + 16,
                    head: [['Voce Resoconto', 'Totale']],
                    body: [
                        ["Ore Lavorative Effettive", `${totLavoro.toFixed(1)} h`],
                        ["Ore Totali di Ferie godute", `${totFerie} h`],
                        ["Ore Totali di Permesso", `${totPermessi} h`],
                        ["MONTE ORE MENSILE (Totale)", `${(totLavoro + totFerie + totPermessi).toFixed(1)} h`]
                    ],
                    headStyles: { fillColor: [30, 41, 59] }
                });
            }

            doc.save(`Resoconto_${dipTxt}.pdf`);
        }

        async function aggiungiDipendente() {
            const nome = document.getElementById('nuovo-nome').value.trim();
            const cognome = document.getElementById('nuovo-cognome').value.trim();
            if(!nome || !cognome) return;
            const { error } = await supabaseClient.from('dipendenti').insert({ nome, cognome });
            if (!error) { document.getElementById('nuovo-nome').value = ''; document.getElementById('nuovo-cognome').value = ''; caricaDati(); }
        }

        window.onload = caricaDati;
    </script>
