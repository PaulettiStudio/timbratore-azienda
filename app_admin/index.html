<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Admin Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .pill-active { background: #0284c7; color: white; border: 1px solid #075985; }
        .pill-inactive { background: #0f172a; color: #64748b; border: 1px solid #1e293b; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <header class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center mb-4">
            <h1 class="text-xl font-black text-white tracking-tight">ADMIN <span class="text-sky-500">CONTROL</span></h1>
            <input type="month" id="filtro-mese" onchange="caricaDati()" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-1 text-xs text-white outline-none">
        </div>
        
        <div id="container-pills" class="max-w-4xl mx-auto flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
            <button onclick="selezionaDipendente('tutti')" id="btn-tutti" class="pill-active flex-shrink-0 px-4 py-1.5 rounded-full text-[11px] font-bold transition">Tutti</button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-6">
        <section>
            <div class="flex justify-between items-end mb-4">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Registro Attività</h2>
                <button onclick="esportaPDF()" class="text-[10px] bg-sky-600 hover:bg-sky-500 text-white px-3 py-1.5 rounded-lg font-bold transition">🖨️ Scarica Report</button>
            </div>
            <div id="lista-giornaliera" class="space-y-4"></div>
        </section>
    </main>

    <script>
        // Credenziali configurate
        const SUPABASE_URL = 'https://gwvzrpuzhxvbxemdqapn.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OmznfN1ZKY_2wkvW-LMtpA_5ITT0Q1B';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let timbrature = [];
        let dipendenti = [];
        let filtroDip = 'tutti';

        async function caricaDati() {
            const mese = document.getElementById('filtro-mese').value || new Date().toISOString().substring(0,7);
            
            const [tData, dData] = await Promise.all([
                supabase.from('timbrature').select('*, dipendenti(nome, cognome)').order('orario', { ascending: false }),
                supabase.from('dipendenti').select('*').order('nome')
            ]);

            timbrature = tData.data || [];
            dipendenti = dData.data || [];
            
            renderPills();
            renderLista();
        }

        function renderPills() {
            const container = document.getElementById('container-pills');
            const btnTutti = document.getElementById('btn-tutti');
            container.innerHTML = '';
            container.appendChild(btnTutti);

            dipendenti.forEach(d => {
                const b = document.createElement('button');
                b.className = 'pill-inactive flex-shrink-0 px-4 py-1.5 rounded-full text-[11px] font-bold transition';
                b.innerText = `${d.nome} ${d.cognome}`;
                b.onclick = () => selezionaDipendente(d.id);
                b.id = `btn-${d.id}`;
                container.appendChild(b);
            });
            selezionaDipendente(filtroDip);
        }

        function selezionaDipendente(id) {
            filtroDip = id;
            document.querySelectorAll('button').forEach(b => b.classList.replace('pill-active', 'pill-inactive'));
            const target = id === 'tutti' ? 'btn-tutti' : `btn-${id}`;
            document.getElementById(target)?.classList.replace('pill-inactive', 'pill-active');
            renderLista();
        }

        function calcolaOreGiorno(entries) {
            let totale = 0;
            let ultimoIn = null;
            entries.sort((a,b) => new Date(a.orario) - new Date(b.orario));
            entries.forEach(e => {
                if(e.tipo_azione === 'INGRESSO') ultimoIn = new Date(e.orario);
                else if(e.tipo_azione === 'USCITA' && ultimoIn) {
                    let diff = (new Date(e.orario) - ultimoIn) / (1000 * 60 * 60);
                    totale += diff;
                    ultimoIn = null;
                }
            });
            return totale.toFixed(1);
        }

        function renderLista() {
            const mese = document.getElementById('filtro-mese').value;
            const filtrati = timbrature.filter(t => (filtroDip === 'tutti' || t.dipendente_id == filtroDip) && t.orario.startsWith(mese));
            
            const listContainer = document.getElementById('lista-giornaliera');
            listContainer.innerHTML = '';
            
            const raggruppati = filtrati.reduce((acc, t) => {
                const data = t.orario.substring(0,10);
                if (!acc[data]) acc[data] = [];
                acc[data].push(t);
                return acc;
            }, {});

            Object.keys(raggruppati).sort().reverse().forEach(data => {
                const entries = raggruppati[data].sort((a,b) => new Date(b.orario) - new Date(a.orario));
                const oreGiorno = calcolaOreGiorno([...entries]);
                
                listContainer.innerHTML += `
                    <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 shadow-lg">
                        <div class="flex justify-between mb-3 border-b border-slate-800 pb-2">
                            <span class="font-black text-white text-sm">${data}</span>
                            <span class="text-emerald-400 font-bold text-xs">${oreGiorno} ore</span>
                        </div>
                        <div class="space-y-2">
                            ${entries.map(e => `
                                <div class="flex justify-between items-center text-[11px] bg-slate-950 p-2 rounded-lg border border-slate-800/50">
                                    <span class="text-slate-400 font-bold">${e.dipendenti?.nome || 'N/A'} ${e.dipendenti?.cognome || ''}</span>
                                    <span class="px-2 py-0.5 rounded-full font-bold ${e.tipo_azione === 'INGRESSO' ? 'bg-emerald-500/10 text-emerald-500' : 'bg-rose-500/10 text-rose-500'}">${e.tipo_azione}</span>
                                    <span class="font-mono text-slate-300">${e.orario.substring(11,16)}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
        }

        function esportaPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Report Presenze Mensile", 14, 15);
            doc.autoTable({
                head: [['Data', 'Dipendente', 'Evento', 'Ora']],
                body: timbrature.map(t => [t.orario.substring(0,10), t.dipendenti?.nome || 'N/A', t.tipo_azione, t.orario.substring(11,16)])
            });
            doc.save("Presenze.pdf");
        }

        window.onload = () => {
            document.getElementById('filtro-mese').value = new Date().toISOString().substring(0,7);
            caricaDati();
        };
    </script>
</body>
</html>
