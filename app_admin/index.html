<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Console Admin - Gestione Totale</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style> touch-action: manipulation; </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col">

    <header class="bg-slate-800 border-b border-slate-700 p-4 sticky top-0 z-50 shadow-md">
        <h1 class="text-xl font-black text-white text-center mb-4">Pannello Amministratore</h1>
        
        <div class="flex bg-slate-900 rounded-xl p-1 gap-1">
            <button onclick="apriLabel('label-timbrature', this)" class="tab-btn flex-1 py-2 text-xs font-bold rounded-lg bg-sky-600 text-white transition">Registro Ore</button>
            <button onclick="apriLabel('label-inserimento', this)" class="tab-btn flex-1 py-2 text-xs font-bold rounded-lg text-slate-400 hover:text-white transition">+ Report / Manuale</button>
            <button onclick="apriLabel('label-dipendenti', this)" class="tab-btn flex-1 py-2 text-xs font-bold rounded-lg text-slate-400 hover:text-white transition">Anagrafica</button>
        </div>
    </header>

    <main class="flex-grow w-full max-w-md mx-auto p-4 pb-12">
        
        <section id="label-timbrature" class="tab-content flex flex-col gap-4">
            
            <div class="bg-slate-800 border border-slate-700 rounded-2xl p-4 flex flex-col gap-3 shadow-sm">
                <div class="flex justify-between items-center border-b border-slate-700 pb-2">
                    <span class="text-xs font-bold text-sky-400 uppercase tracking-wider">Filtra Calendario & Risorse</span>
                    <button onclick="resetFiltri()" class="text-[11px] text-slate-400 hover:text-white underline">Resetta</button>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[10px] text-slate-400 block mb-1 font-bold uppercase">Dipendente</label>
                        <select id="filtro-dipendente" onchange="filtraERenderizza()" class="bg-slate-900 border border-slate-700 rounded-xl px-2 py-2 text-xs text-white w-full focus:border-sky-500 outline-none">
                            <option value="tutti">Tutti i dipendenti</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400 block mb-1 font-bold uppercase">Giorno Specifico</label>
                        <input type="date" id="filtro-data" onchange="filtraERenderizza()" class="bg-slate-900 border border-slate-700 rounded-xl px-2 py-1.5 text-xs text-white w-full focus:border-sky-500 outline-none">
                    </div>
                </div>
            </div>

            <div class="flex justify-between items-center mt-2">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Vista Cronologica</h2>
                <div class="flex gap-2">
                    <button onclick="generaPDF()" class="text-xs bg-sky-600/20 text-sky-400 border border-sky-500/30 px-2.5 py-1 rounded-lg font-bold hover:bg-sky-600/30 transition">🖨️ Esporta PDF</button>
                    <button onclick="caricaDati()" class="text-xs bg-slate-700 px-2.5 py-1 rounded-lg font-bold hover:bg-slate-600 transition">↻</button>
                </div>
            </div>

            <div id="contenitore-calendario" class="flex flex-col gap-6">
                <p class="text-center text-slate-500 text-sm mt-10 animate-pulse">Caricamento in corso...</p>
            </div>
        </section>

        <section id="label-inserimento" class="tab-content hidden flex flex-col gap-4">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider">Inserimento Report / Correzioni</h2>
            
            <div class="bg-slate-800 border border-slate-700 rounded-2xl p-5 flex flex-col gap-4 shadow-md">
                <p class="text-xs text-slate-400">Usa questo modulo per inserire timbrature dimenticate, ore di lavoro esterno o modifiche manuali ai report.</p>
                
                <div>
                    <label class="text-xs font-bold text-slate-300 block mb-1">1. Seleziona Dipendente</label>
                    <select id="manual-dipendente" class="bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-sm text-white w-full outline-none focus:border-sky-500">
                        </select>
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-300 block mb-1">2. Data e Ora Reale della Scansione</label>
                    <input type="datetime-local" id="manual-orario" class="bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-sm text-white w-full outline-none focus:border-sky-500">
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-300 block mb-1">3. Tipo di Azione</label>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="bg-slate-900 border border-slate-700 rounded-xl p-3 flex items-center gap-2 cursor-pointer select-none border-2 has-[:checked]:border-emerald-500">
                            <input type="radio" name="manual-azione" value="INGRESSO" checked class="accent-emerald-500">
                            <span class="text-sm font-bold text-emerald-400">INGRESSO</span>
                        </label>
                        <label class="bg-slate-900 border border-slate-700 rounded-xl p-3 flex items-center gap-2 cursor-pointer select-none border-2 has-[:checked]:border-rose-500">
                            <input type="radio" name="manual-azione" value="USCITA" class="accent-rose-500">
                            <span class="text-sm font-bold text-rose-400">USCITA</span>
                        </label>
                    </div>
                </div>

                <button onclick="aggiungiTimbraturaManuale()" class="bg-sky-600 hover:bg-sky-500 text-white font-bold p-3.5 rounded-xl text-sm transition mt-2 shadow-lg active:scale-95">
                    Salva Report nel Database
                </button>
            </div>
        </section>

        <section id="label-dipendenti" class="tab-content hidden flex flex-col gap-4">
            <div class="bg-slate-800 border border-slate-700 rounded-2xl p-4 flex flex-col gap-3">
                <h3 class="text-xs font-bold text-emerald-400 uppercase tracking-wider">Nuovo Profilo Dipendente</h3>
                <div class="flex gap-2">
                    <input type="text" id="nuovo-nome" placeholder="Nome" class="bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm w-full outline-none focus:border-emerald-500">
                    <input type="text" id="nuovo-cognome" placeholder="Cognome" class="bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm w-full outline-none focus:border-emerald-500">
                </div>
                <button onclick="aggiungiDipendente()" class="bg-emerald-600 font-bold p-2.5 rounded-xl text-sm hover:bg-emerald-500 transition">Crea Anagrafica</button>
            </div>

            <h2 class="text-sm font-bold text-slate-400 uppercase mt-4 tracking-wider">Badge & Collegamenti Personali</h2>
            <div id="lista-dipendenti" class="flex flex-col gap-3"></div>
        </section>

    </main>

    <script>
        // CONFIGURAZIONE SUPABASE
        const SUPABASE_URL = 'https://gwvzrpuzhxvbxemdqapn.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OmznfN1ZKY_2wkvW-LMtpA_5ITT0Q1B';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let timbratureGlobali = []; 
        let dipendentiGlobali = [];
        let timbratureFiltrate = [];

        // GESTIONE DEI TAB/LABEL
        function apriLabel(idLabel, bottone) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(idLabel).classList.remove('hidden');
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-sky-600', 'text-white');
                btn.classList.add('text-slate-400');
            });
            bottone.classList.remove('text-slate-400');
            bottone.classList.add('bg-sky-600', 'text-white');
        }

        // ARROTONDAMENTO STRUTTURALE AI 15 MINUTI
        function arrotondaAi15Minuti(dataIso) {
            let d = new Date(dataIso);
            let m = d.getMinutes();
            let arrot = Math.round(m / 15) * 15;
            
            if (arrot === 60) {
                d.setHours(d.getHours() + 1);
                d.setMinutes(0);
            } else {
                d.setMinutes(arrot);
            }
            d.setSeconds(0);
            return d;
        }

        function formattaOra(dataOggetto) {
            return dataOggetto.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
        }

        // SCARICAMENTO E REFRESH INIZIALE DATI
        async function caricaDati() {
            try {
                // 1. Scarica Anagrafica Dipendenti
                const { data: dipendenti, error: dErr } = await supabaseClient.from('dipendenti').select('*').order('cognome');
                if (dErr) throw dErr;
                dipendentiGlobali = dipendenti;
                aggiornaSelettoriMenu();

                // 2. Scarica Registro Timbrature
                const { data: timbrature, error: tErr } = await supabaseClient
                    .from('timbrature')
                    .select('id, orario, tipo_azione, dipendente_id, dipendenti(nome, cognome)')
                    .order('orario', { ascending: false });

                if (tErr) throw tErr;
                timbratureGlobali = timbrature;
                
                // Renderizza la vista filtrata (inizialmente mostra tutto)
                filtraERenderizza();

            } catch (err) {
                console.error(err);
                document.getElementById('contenitore-calendario').innerHTML = '<p class="text-rose-500 text-center text-xs">Errore nel caricamento del database.</p>';
            }
        }

        // AGGIORNA I MENU A TENDINA CON I DIPENDENTI REALI
        function aggiornaSelettoriMenu() {
            const filtroDip = document.getElementById('filtro-dipendente');
            const manualDip = document.getElementById('manual-dipendente');
            const containerLista = document.getElementById('lista-dipendenti');

            // Mantieni la prima opzione di reset
            filtroDip.innerHTML = '<option value="tutti">Tutti i dipendenti</option>';
            manualDip.innerHTML = '<option value="">-- Scegli Dipendente --</option>';
            containerLista.innerHTML = '';

            dipendentiGlobali.forEach(d => {
                const optText = `${d.cognome} ${d.nome}`;
                filtroDip.innerHTML += `<option value="${d.id}">${optText}</option>`;
                manualDip.innerHTML += `<option value="${d.id}">${optText}</option>`;

                // Rigenerazione Link Badge Dinamica Sotto-Cartella Universale
                const percorsoBase = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
                const linkBadge = `${window.location.origin}${percorsoBase}badge.html?id=${d.id}`;

                containerLista.innerHTML += `
                    <div class="bg-slate-800 border border-slate-700 rounded-xl p-3 shadow-sm">
                        <div class="flex justify-between items-center mb-1.5">
                            <span class="font-bold text-sm text-slate-200">${d.cognome} ${d.nome}</span>
                            <button onclick="navigator.clipboard.writeText('${linkBadge}'); alert('Copiato!');" class="text-[11px] bg-slate-700 text-sky-400 px-2 py-1 rounded font-bold hover:bg-slate-600">Copia Link</button>
                        </div>
                        <div class="text-[10px] text-slate-500 font-mono break-all bg-slate-900/50 p-2 rounded border border-slate-800">${linkBadge}</div>
                    </div>
                `;
            });
        }

        // APPLICAZIONE DEI FILTRI DI VISUALIZZAZIONE IN TEMPO REALE
        function filtraERenderizza() {
            const dipendenteScelto = document.getElementById('filtro-dipendente').value;
            const dataScelta = document.getElementById('filtro-data').value; // Formato YYYY-MM-DD

            // Esegui il filtraggio sull'array in memoria
            timbratureFiltrate = timbratureGlobali.filter(t => {
                let matchDipendente = true;
                let matchData = true;

                if (dipendenteScelto !== 'tutti') {
                    // Controllo di tolleranza sulla struttura della relazione
                    const idRecord = t.dipendente_id || (t.dipendenti ? t.dipendenti.id : null);
                    matchDipendente = String(idRecord) === String(dipendenteScelto);
                }

                if (dataScelta) {
                    const dataRecordStr = new Date(t.orario).toISOString().split('T')[0];
                    matchData = dataRecordStr === dataScelta;
                }

                return matchDipendente && matchData;
            });

            renderizzaVistaCalendario();
        }

        // COMPOSIZIONE GRAFICA A CALENDARIO (RAGGRUPPATA PER GIORNO)
        function renderizzaVistaCalendario() {
            const container = document.getElementById('contenitore-calendario');
            if (timbratureFiltrate.length === 0) {
                container.innerHTML = '<p class="text-center text-sm text-slate-500 py-10">Nessuna timbratura corrisponde ai filtri selezionati.</p>';
                return;
            }

            // Raggruppamento dati per stringa di data leggibile
            const giorniRaggruppati = {};
            timbratureFiltrate.forEach(t => {
                const dataObj = new Date(t.orario);
                const opzioni = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
                const chiaveGiorno = dataObj.toLocaleDateString('it-IT', opzioni);

                if (!giorniRaggruppati[chiaveGiorno]) {
                    giorniRaggruppati[chiaveGiorno] = [];
                }
                giorniRaggruppati[chiaveGiorno].push(t);
            });

            container.innerHTML = '';

            // Generazione Blocchi Calendario nel DOM
            for (const [giorno, timbratureDelGiorno] of Object.entries(giorniRaggruppati)) {
                let bloccoGiornoHTML = `
                    <div class="flex flex-col gap-2">
                        <div class="text-xs font-black uppercase text-sky-400 tracking-wider bg-slate-800/40 px-3 py-1.5 rounded-lg border border-slate-700/30 w-full capitalize">${giorno}</div>
                        <div class="flex flex-col gap-2 pl-1">
                `;

                timbratureDelGiorno.forEach(t => {
                    const dataReale = new Date(t.orario);
                    const orarioArrotondatoObj = arrotondaAi15Minuti(t.orario);
                    
                    const oraArrotondata = formattaOra(orarioArrotondatoObj);
                    const oraReale = formattaOra(dataReale);
                    
                    const nome = t.dipendenti ? `${t.dipendenti.nome} ${t.dipendenti.cognome}` : 'Risorsa';
                    const coloreBadge = t.tipo_azione === 'INGRESSO' ? 'text-emerald-400 bg-emerald-400/10 border-emerald-500/20' : 'text-rose-400 bg-rose-400/10 border-rose-500/20';

                    bloccoGiornoHTML += `
                        <div class="bg-slate-800/80 border border-slate-700/60 rounded-xl p-3 flex justify-between items-center shadow-sm">
                            <div>
                                <h4 class="font-bold text-slate-100 text-sm">${nome}</h4>
                                <p class="text-[11px] text-slate-400">Tempo Reale: <span class="font-mono">${oraReale}</span></p>
                            </div>
                            <div class="text-right flex items-center gap-3">
                                <div class="text-center">
                                    <span class="text-[10px] font-bold px-2 py-0.5 rounded border ${coloreBadge}">${t.tipo_azione}</span>
                                    <div class="text-base font-mono font-black text-sky-400 mt-1">${oraArrotondata}</div>
                                </div>
                            </div>
                        </div>
                    `;
                });

                bloccoGiornoHTML += `</div></div>`;
                container.innerHTML += bloccoGiornoHTML;
            }
        }

        function resetFiltri() {
            document.getElementById('filtro-dipendente').value = 'tutti';
            document.getElementById('filtro-data').value = '';
            filtraERenderizza();
        }

        // SALVATAGGIO DI UN REPORT ESTERNO / TIMBRATURA MANUALE
        async function aggiungiTimbraturaManuale() {
            const dipendenteId = document.getElementById('manual-dipendente').value;
            const orarioStringa = document.getElementById('manual-orario').value;
            const azioneSelezionata = document.querySelector('input[name="manual-azione"]:checked').value;

            if (!dipendenteId) { alert("Seleziona un dipendente valido."); return; }
            if (!orarioStringa) { alert("Imposta una data e un orario validi."); return; }

            // Conversione dell'orario locale in stringa ISO conforme per Supabase
            const dataIsoCorretta = new Date(orarioStringa).toISOString();

            try {
                const { error } = await supabaseClient.from('timbrature').insert({
                    dipendente_id: dipendenteId,
                    orario: dataIsoCorretta,
                    tipo_azione: azioneSelezionata
                });

                if (error) throw error;

                alert("Report esterno inserito con successo!");
                document.getElementById('manual-orario').value = '';
                await caricaDati();
                apriLabel('label-timbrature', document.querySelectorAll('.tab-btn')[0]);

            } catch (err) {
                alert("Errore inserimento: verifica i campi del database o i vincoli della tabella.");
                console.error(err);
            }
        }

        // CREAZIONE E GENERAZIONE DEL PDF BASATO SUI FILTRI SELEZIONATI
        function generaPDF() {
            if (timbratureFiltrate.length === 0) {
                alert("Nessun record da esportare con i filtri correnti.");
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFontSize(18);
            doc.text("Registro Presenze Contabilizzato", 14, 20);
            
            // Sotto-titolo dinamico informativo sui filtri attivi
            doc.setFontSize(10);
            let filtriAttiviTesto = "Filtro applicato: Tutto il personale attivo.";
            const dipScelto = document.getElementById('filtro-dipendente');
            if(dipScelto.value !== 'tutti') {
                filtriAttiviTesto = `Report Risorsa: ${dipScelto.options[dipScelto.selectedIndex].text}`;
            }
            doc.text(filtriAttiviTesto, 14, 27);
            doc.text("Arrotondamento ore eseguito a blocchi di 15 minuti commerciali.", 14, 32);

            // Mappatura dati filtrati per la griglia
            const righeTabella = timbratureFiltrate.map(t => {
                const dataReale = new Date(t.orario);
                const orarioArrotondatoObj = arrotondaAi15Minuti(t.orario);
                
                const giorno = dataReale.toLocaleDateString('it-IT');
                const nome = t.dipendenti ? `${t.dipendenti.nome} ${t.dipendenti.cognome}` : 'Ignoto';
                const azione = t.tipo_azione;
                const oraArrot = formattaOra(orarioArrotondatoObj);
                const oraReale = formattaOra(dataReale);

                return [giorno, nome, azione, oraArrot, `(reale: ${oraReale})`];
            });

            doc.autoTable({
                startY: 38,
                head: [['Data', 'Dipendente', 'Azione', 'Ora Calcolata (15m)', 'Scansione Originale']],
                body: righeTabella,
                theme: 'striped',
                headStyles: { fillColor: [2, 132, 199] }
            });

            doc.save(`Report_Presenze_Filtarto.pdf`);
        }

        // CREAZIONE NUOVO ACCOUNT DIPENDENTE
        async function aggiungiDipendente() {
            const nome = document.getElementById('nuovo-nome').value.trim();
            const cognome = document.getElementById('nuovo-cognome').value.trim();

            if(!nome || !cognome) { alert("Campi anagrafici vuoti."); return; }

            const { error } = await supabaseClient.from('dipendenti').insert({ nome, cognome });
            if (error) alert("Errore: " + error.message);
            else {
                document.getElementById('nuovo-nome').value = '';
                document.getElementById('nuovo-cognome').value = '';
                caricaDati();
            }
        }

        window.onload = caricaDati;
    </script>
</body>
</html>
