<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Console Admin - Dashboard e Calendario Presenze</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style> 
        touch-action: manipulation; 
        input[type="month"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col">

    <header class="bg-slate-800 border-b border-slate-700 p-4 sticky top-0 z-50 shadow-md">
        <h1 class="text-xl font-black text-white text-center mb-4">Pannello Amministratore</h1>
        
        <div class="flex bg-slate-900 rounded-xl p-1 gap-1">
            <button onclick="apriLabel('label-timbrature', this)" class="tab-btn flex-1 py-2 text-xs font-bold rounded-lg bg-sky-600 text-white transition">Calendario & Ore</button>
            <button onclick="apriLabel('label-inserimento', this)" class="tab-btn flex-1 py-2 text-xs font-bold rounded-lg text-slate-400 hover:text-white transition">+ Giustificativi / Ore</button>
            <button onclick="apriLabel('label-dipendenti', this)" class="tab-btn flex-1 py-2 text-xs font-bold rounded-lg text-slate-400 hover:text-white transition">Anagrafica</button>
        </div>
    </header>

    <main class="flex-grow w-full max-w-md mx-auto p-4 pb-12">
        
        <section id="label-timbrature" class="tab-content flex flex-col gap-4">
            
            <div class="grid grid-cols-3 gap-2 bg-slate-800/80 border border-slate-700 p-3 rounded-2xl shadow-sm text-center">
                <div class="bg-slate-900/50 p-2 rounded-xl border border-slate-800">
                    <span class="text-[9px] font-bold uppercase text-slate-400 block">Oggi</span>
                    <span id="ore-oggi" class="text-base font-black text-emerald-400 font-mono">0.0h</span>
                </div>
                <div class="bg-slate-900/50 p-2 rounded-xl border border-slate-800">
                    <span class="text-[9px] font-bold uppercase text-slate-400 block">Settimana</span>
                    <span id="ore-settimana" class="text-base font-black text-sky-400 font-mono">0.0h</span>
                </div>
                <div class="bg-slate-900/50 p-2 rounded-xl border border-slate-800">
                    <span class="text-[9px] font-bold uppercase text-slate-400 block">Mese Filtro</span>
                    <span id="ore-mese" class="text-base font-black text-amber-400 font-mono">0.0h</span>
                </div>
            </div>

            <div class="bg-slate-800 border border-slate-700 rounded-2xl p-4 flex flex-col gap-3 shadow-sm">
                <div class="flex justify-between items-center border-b border-slate-700 pb-2">
                    <span class="text-xs font-bold text-sky-400 uppercase tracking-wider">Filtra Risorse e Periodo</span>
                    <button onclick="resetFiltri()" class="text-[11px] text-slate-400 hover:text-white underline">Reset</button>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[10px] text-slate-400 block mb-1 font-bold uppercase">Dipendente</label>
                        <select id="filtro-dipendente" onchange="filtraERenderizza()" class="bg-slate-900 border border-slate-700 rounded-xl px-2 py-2 text-xs text-white w-full focus:border-sky-500 outline-none">
                            <option value="tutti">Tutti i dipendenti</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400 block mb-1 font-bold uppercase">Mese di Riferimento</label>
                        <input type="month" id="filtro-mese" onchange="filtraERenderizza()" class="bg-slate-900 border border-slate-700 rounded-xl px-2 py-1.5 text-xs text-white w-full focus:border-sky-500 outline-none">
                    </div>
                </div>
            </div>

            <div class="flex bg-slate-800 border border-slate-700 rounded-xl p-1 gap-1">
                <button id="btn-vista-calendario" onclick="cambiaVista('calendario')" class="flex-1 py-1.5 text-xs font-bold rounded-lg bg-slate-700 text-white transition flex justify-center items-center gap-1">
                    📅 Vista Calendario
                </button>
                <button id="btn-vista-registro" onclick="cambiaVista('registro')" class="flex-1 py-1.5 text-xs font-bold rounded-lg text-slate-400 hover:text-white transition flex justify-center items-center gap-1">
                    📋 Registro Scritto
                </button>
            </div>

            <div id="sezione-vista-calendario" class="bg-slate-800 border border-slate-700 rounded-2xl p-3 shadow-md">
                <div class="text-center text-xs font-bold text-slate-400 uppercase tracking-widest mb-3" id="nome-mese-titolo">Mese</div>
                <div class="grid grid-cols-7 gap-1 text-center text-[10px] font-bold text-slate-500 mb-1">
                    <div>LUN</div><div>MAR</div><div>MER</div><div>GIO</div><div>VEN</div><div>SAB</div><div>DOM</div>
                </div>
                <div id="griglia-calendario-fisico" class="grid grid-cols-7 gap-1">
                    </div>
            </div>

            <div id="sezione-vista-registro" class="hidden bg-slate-800 border border-slate-700 rounded-2xl p-4 shadow-md flex flex-col gap-2">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider border-b border-slate-700 pb-2 mb-1">Giornale di Bordo Analitico</h3>
                <div id="contenitore-lista-movimenti" class="flex flex-col gap-2 max-h-[380px] overflow-y-auto pr-1">
                    </div>
            </div>

            <div class="flex justify-end items-center mt-1">
                <button onclick="generaPDF()" class="text-xs bg-sky-600 hover:bg-sky-500 text-white px-4 py-2.5 rounded-xl font-black shadow-md transition w-full text-center">
                    🖨️ Esporta PDF con Resoconti Totali
                </button>
            </div>
        </section>

        <section id="label-inserimento" class="tab-content hidden flex flex-col gap-4">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider">Inserimento Manuale d'Ufficio</h2>
            
            <div class="bg-slate-800 border border-slate-700 rounded-2xl p-5 flex flex-col gap-4 shadow-md">
                <div>
                    <label class="text-xs font-bold text-slate-300 block mb-1">1. Seleziona Dipendente</label>
                    <select id="manual-dipendente" class="bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-sm text-white w-full outline-none focus:border-sky-500">
                    </select>
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-300 block mb-1">2. Data e Ora della Scansione</label>
                    <input type="datetime-local" id="manual-orario" class="bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-sm text-white w-full outline-none focus:border-sky-500">
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-300 block mb-1">3. Tipo di Evento / Giustificativo</label>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="bg-slate-900 border border-slate-700 rounded-xl p-3 flex items-center gap-2 cursor-pointer border-2 has-[:checked]:border-emerald-500">
                            <input type="radio" name="manual-azione" value="INGRESSO" checked class="accent-emerald-500">
                            <span class="text-xs font-bold text-emerald-400">INGRESSO</span>
                        </label>
                        <label class="bg-slate-900 border border-slate-700 rounded-xl p-3 flex items-center gap-2 cursor-pointer border-2 has-[:checked]:border-rose-500">
                            <input type="radio" name="manual-azione" value="USCITA" class="accent-rose-500">
                            <span class="text-xs font-bold text-rose-400">USCITA</span>
                        </label>
                        <label class="bg-slate-900 border border-slate-700 rounded-xl p-3 flex items-center gap-2 cursor-pointer border-2 has-[:checked]:border-amber-500">
                            <input type="radio" name="manual-azione" value="FERIE" class="accent-amber-500">
                            <span class="text-xs font-bold text-amber-400">🌴 FERIE (8h)</span>
                        </label>
                        <label class="bg-slate-900 border border-slate-700 rounded-xl p-3 flex items-center gap-2 cursor-pointer border-2 has-[:checked]:border-indigo-500">
                            <input type="radio" name="manual-azione" value="PERMESSO" class="accent-indigo-500">
                            <span class="text-xs font-bold text-indigo-400">⏱️ PERMESSO (8h)</span>
                        </label>
                    </div>
                </div>

                <button onclick="aggiungiTimbraturaManuale()" class="bg-sky-600 hover:bg-sky-500 text-white font-bold p-3.5 rounded-xl text-sm transition shadow-lg active:scale-95">
                    Registra nel Sistema
                </button>
            </div>
        </section>

        <section id="label-dipendenti" class="tab-content hidden flex flex-col gap-4">
            <div class="bg-slate-800 border border-slate-700 rounded-2xl p-4 flex flex-col gap-3">
                <h3 class="text-xs font-bold text-emerald-400 uppercase tracking-wider">Aggiungi Dipendente</h3>
                <div class="flex gap-2">
                    <input type="text" id="nuovo-nome" placeholder="Nome" class="bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm w-full outline-none">
                    <input type="text" id="nuovo-cognome" placeholder="Cognome" class="bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm w-full outline-none">
                </div>
                <button onclick="aggiungiDipendente()" class="bg-emerald-600 font-bold p-2.5 rounded-xl text-sm hover:bg-emerald-500 transition">Salva Anagrafica</button>
            </div>

            <h2 class="text-sm font-bold text-slate-400 uppercase mt-4 tracking-wider">Link Badge Generati</h2>
            <div id="lista-dipendenti" class="flex flex-col gap-3"></div>
        </section>

    </main>

    <script>
        // CONFIGURAZIONE SUPABASE
        const SUPABASE_URL = 'https://gwvzrpuzhxvbxemdqapn.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OmznfN1ZKY_2wkvW-LMtpA_5ITT0Q1B';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let timbratureGlobali = []; 
        let dipendentiGlobali = [];
        let timbratureFiltrate = [];
        let vistaAttiva = 'calendario';

        // Imposta correttamente il mese di partenza
        const oggiIniziale = new Date();
        document.getElementById('filtro-mese').value = oggiIniziale.toISOString().substring(0, 7);

        function apriLabel(idLabel, bottone) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(idLabel).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-sky-600', 'text-white');
                btn.classList.add('text-slate-400');
            });
            bottone.classList.remove('text-slate-400');
            bottone.classList.add('bg-sky-600', 'text-white');
        }

        function cambiaVista(tipo) {
            vistaAttiva = tipo;
            const btnCal = document.getElementById('btn-vista-calendario');
            const btnReg = document.getElementById('btn-vista-registro');
            const sezCal = document.getElementById('sezione-vista-calendario');
            const sezReg = document.getElementById('sezione-vista-registro');

            if (tipo === 'calendario') {
                btnCal.classList.add('bg-slate-700', 'text-white');
                btnCal.classList.remove('text-slate-400');
                btnReg.classList.remove('bg-slate-700', 'text-white');
                btnReg.classList.add('text-slate-400');
                sezCal.classList.remove('hidden');
                sezReg.classList.add('hidden');
            } else {
                btnReg.classList.add('bg-slate-700', 'text-white');
                btnReg.classList.remove('text-slate-400');
                btnCal.classList.remove('bg-slate-700', 'text-white');
                btnCal.classList.add('text-slate-400');
                sezReg.classList.remove('hidden');
                sezCal.classList.add('hidden');
            }
        }

        // ARROTONDAMENTO COMMERCIALE (15 MINUTI CON SOGLIA A 7 MINUTI)
        function arrotondaAi15Minuti(dataIso) {
            let d = new Date(dataIso);
            let m = d.getMinutes();
            let resto = m % 15;
            let arrot = resto >= 7 ? m + (15 - resto) : m - resto;
            
            if (arrot === 60) {
                d.setHours(d.getHours() + 1);
                d.setMinutes(0);
            } else {
                d.setMinutes(arrot);
            }
            d.setSeconds(0, 0);
            return d;
        }

        function formattaOra(dataOggetto) {
            return dataOggetto.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
        }

        function getInizioSettimana(data) {
            let d = new Date(data);
            let day = d.getDay();
            let diff = d.getDate() - day + (day == 0 ? -6 : 1);
            return new Date(d.setDate(diff)).toISOString().split('T')[0];
        }

        // CARICAMENTO SUPABASE DELLE ANAGRAFICHE E TIMBRATURE
        async function caricaDati() {
            try {
                const { data: dipendenti, error: dErr } = await supabaseClient.from('dipendenti').select('*').order('cognome');
                if (dErr) throw dErr;
                dipendentiGlobali = dipendenti;
                aggiornaSelettoriMenu();

                const { data: timbrature, error: tErr } = await supabaseClient
                    .from('timbrature')
                    .select('id, orario, tipo_azione, dipendente_id, dipendenti(nome, cognome)')
                    .order('orario', { ascending: false });

                if (tErr) throw tErr;
                timbratureGlobali = timbrature;
                
                filtraERenderizza();
            } catch (err) {
                console.error("Errore durante la sincronizzazione con Supabase:", err);
            }
        }

        function aggiornaSelettoriMenu() {
            const filtroDip = document.getElementById('filtro-dipendente');
            const manualDip = document.getElementById('manual-dipendente');
            const containerLista = document.getElementById('lista-dipendenti');

            filtroDip.innerHTML = '<option value="tutti">Tutti i dipendenti</option>';
            manualDip.innerHTML = '<option value="">-- Scegli Dipendente --</option>';
            containerLista.innerHTML = '';

            dipendentiGlobali.forEach(d => {
                const optText = `${d.cognome} ${d.nome}`;
                filtroDip.innerHTML += `<option value="${d.id}">${optText}</option>`;
                manualDip.innerHTML += `<option value="${d.id}">${optText}</option>`;

                const percorsoBase = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
                const linkBadge = `${window.location.origin}${percorsoBase}badge.html?id=${d.id}`;

                containerLista.innerHTML += `
                    <div class="bg-slate-800 border border-slate-700 rounded-xl p-3 shadow-sm">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-bold text-sm text-slate-200">${d.cognome} ${d.nome}</span>
                            <button onclick="navigator.clipboard.writeText('${linkBadge}'); alert('Copiato!');" class="text-[11px] bg-slate-700 text-sky-400 px-2 py-0.5 rounded font-bold">Copia</button>
                        </div>
                        <div class="text-[10px] text-slate-500 font-mono break-all bg-slate-900/50 p-1.5 rounded border border-slate-800">${linkBadge}</div>
                    </div>
                `;
            });
        }

        function filtraERenderizza() {
            const dipendenteScelto = document.getElementById('filtro-dipendente').value;
            const meseSceltoStr = document.getElementById('filtro-mese').value; 

            timbratureFiltrate = timbratureGlobali.filter(t => {
                let matchDipendente = true;
                let matchMese = true;

                if (dipendenteScelto !== 'tutti') {
                    const idRecord = t.dipendente_id || (t.dipendenti ? t.dipendenti.id : null);
                    matchDipendente = String(idRecord) === String(dipendenteScelto);
                }
                if (meseSceltoStr) {
                    const recordMeseStr = t.orario.substring(0, 7);
                    matchMese = recordMeseStr === meseSceltoStr;
                }
                return matchDipendente && matchMese;
            });

            calcolaEVisualizzaMetriche(dipendenteScelto, meseSceltoStr);
            renderizzaCalendarioFisico(meseSceltoStr);
            renderizzaListaMovimentiSotto();
        }

        function calcolaEVisualizzaMetriche(dipendenteId, meseFiltro) {
            let totaleOggi = 0;
            let totaleSettimana = 0;
            let totaleMese = 0;

            const oggiStr = new Date().toISOString().split('T')[0];
            const inizioSettimanaStr = getInizioSettimana(new Date());

            let mappaDip = {};
            timbratureGlobali.forEach(t => {
                const id = t.dipendente_id || (t.dipendenti ? t.dipendenti.id : 'ignoto');
                if (dipendenteId !== 'tutti' && String(id) !== String(dipendenteId)) return;
                if (!mappaDip[id]) mappaDip[id] = [];
                mappaDip[id].push(t);
            });

            for (let id in mappaDip) {
                mappaDip[id].sort((a, b) => new Date(a.orario) - new Date(b.orario));
                let ultimoIngresso = null;

                mappaDip[id].forEach(t => {
                    let dataObj = new Date(t.orario);
                    let dataStr = dataObj.toISOString().split('T')[0];
                    let settStr = getInizioSettimana(dataObj);
                    let recMeseStr = t.orario.substring(0, 7);

                    let oreDaAggiungere = 0;

                    if (t.tipo_azione === 'INGRESSO') {
                        ultimoIngresso = t;
                    } else if (t.tipo_azione === 'USCITA') {
                        if (ultimoIngresso) {
                            let diff = arrotondaAi15Minuti(t.orario) - arrotondaAi15Minuti(ultimoIngresso.orario);
                            if (diff > 0) oreDaAggiungere = diff / (1000 * 60 * 60);
                            ultimoIngresso = null;
                        }
                    } else if (t.tipo_azione === 'FERIE' || t.tipo_azione === 'PERMESSO') {
                        oreDaAggiungere = 8; 
                    }

                    if (oreDaAggiungere > 0) {
                        if (dataStr === oggiStr) totaleOggi += oreDaAggiungere;
                        if (settStr === inizioSettimanaStr) totaleSettimana += oreDaAggiungere;
                        if (recMeseStr === meseFiltro) totaleMese += oreDaAggiungere;
                    }
                });
            }

            document.getElementById('ore-oggi').innerText = totaleOggi.toFixed(1) + 'h';
            document.getElementById('ore-settimana').innerText = totaleSettimana.toFixed(1) + 'h';
            document.getElementById('ore-mese').innerText = totaleMese.toFixed(1) + 'h';
        }

        // GENERAZIONE VISUALIZZAZIONE CALENDARIO (MATRICE)
        function renderizzaCalendarioFisico(meseSceltoStr) {
            const griglia = document.getElementById('griglia-calendario-fisico');
            griglia.innerHTML = '';
            if(!meseSceltoStr) return;

            const [anno, mese] = meseSceltoStr.split('-').map(Number);
            const opzioniMese = { month: 'long', year: 'numeric' };
            document.getElementById('nome-mese-titolo').innerText = new Date(anno, mese - 1, 1).toLocaleDateString('it-IT', opzioniMese);

            const primoGiornoMese = new Date(anno, mese - 1, 1);
            const ultimoGiornoMese = new Date(anno, mese, 0);
            const totaleGiorni = ultimoGiornoMese.getDate();
            
            let giornoSettimanaIniziale = primoGiornoMese.getDay();
            giornoSettimanaIniziale = giornoSettimanaIniziale === 0 ? 6 : giornoSettimanaIniziale - 1;

            let orePerGiorno = {};
            let tipoPrevalenteGiorno = {};

            let dipLogici = {};
            timbratureFiltrate.forEach(t => {
                let dId = t.dipendente_id || 'unkn';
                if(!dipLogici[dId]) dipLogici[dId] = [];
                dipLogici[dId].push(t);
            });

            for(let dId in dipLogici) {
                dipLogici[dId].sort((a,b) => new Date(a.orario) - new Date(b.orario));
                let inPres = null;
                dipLogici[dId].forEach(r => {
                    let dataR = new Date(r.orario);
                    let gNum = dataR.getDate();
                    if(!orePerGiorno[gNum]) orePerGiorno[gNum] = 0;

                    if(r.tipo_azione === 'INGRESSO') inPres = r;
                    else if(r.tipo_azione === 'USCITA' && inPres) {
                        let diff = arrotondaAi15Minuti(r.orario) - arrotondaAi15Minuti(inPres.orario);
                        if(diff > 0) orePerGiorno[gNum] += diff / (1000*60*60);
                        inPres = null;
                    } else if(r.tipo_azione === 'FERIE' || r.tipo_azione === 'PERMESSO') {
                        orePerGiorno[gNum] += 8;
                        tipoPrevalenteGiorno[gNum] = r.tipo_azione;
                    }
                });
            }

            for (let i = 0; i < giornoSettimanaIniziale; i++) {
                griglia.innerHTML += `<div class="bg-slate-900/20 border border-transparent h-14 rounded-lg"></div>`;
            }

            for (let giorno = 1; giorno <= totaleGiorni; giorno++) {
                const oreMaturate = orePerGiorno[giorno] || 0;
                let stringaOre = '';
                let coloreTestoOre = 'text-sky-400';

                if (oreMaturate > 0) {
                    stringaOre = `${oreMaturate.toFixed(1)}h`;
                    if(tipoPrevalenteGiorno[giorno] === 'FERIE') coloreTestoOre = 'text-amber-400 font-bold';
                    if(tipoPrevalenteGiorno[giorno] === 'PERMESSO') coloreTestoOre = 'text-indigo-400 font-bold';
                }

                griglia.innerHTML += `
                    <div class="bg-slate-900/60 border border-slate-700/60 h-14 rounded-xl p-1 flex flex-col justify-between relative shadow-inner">
                        <span class="text-[10px] font-bold text-slate-400">${giorno}</span>
                        <span class="text-[10px] font-mono text-right ${coloreTestoOre} mt-auto tracking-tighter">${stringaOre}</span>
                    </div>
                `;
            }
        }

        // GENERAZIONE VISUALIZZAZIONE REGISTRO SCRITTO NORMALE
        function renderizzaListaMovimentiSotto() {
            const container = document.getElementById('contenitore-lista-movimenti');
            if (timbratureFiltrate.length === 0) {
                container.innerHTML = '<p class="text-center text-xs text-slate-500 py-4">Nessun movimento trovato per i filtri impostati.</p>';
                return;
            }
            container.innerHTML = '';
            
            timbratureFiltrate.forEach(t => {
                const dataReale = new Date(t.orario);
                const giornoStr = dataReale.toLocaleDateString('it-IT', { day: 'numeric', month: 'short', year: 'numeric' });
                const oraReale = formattaOra(dataReale);
                const nome = t.dipendenti ? `${t.dipendenti.nome} ${t.dipendenti.cognome}` : 'Risorsa';
                
                let colore = 'text-emerald-400 bg-emerald-400/10 border-emerald-500/10';
                let oraCalcolata = formattaOra(arrotondaAi15Minuti(t.orario));

                if(t.tipo_azione === 'USCITA') colore = 'text-rose-400 bg-rose-400/10 border-rose-500/10';
                if(t.tipo_azione === 'FERIE') { colore = 'text-amber-400 bg-amber-400/10 border-amber-500/10'; oraCalcolata = "Giornata (8h)"; }
                if(t.tipo_azione === 'PERMESSO') { colore = 'text-indigo-400 bg-indigo-400/10 border-indigo-500/10'; oraCalcolata = "Giornata (8h)"; }

                container.innerHTML += `
                    <div class="bg-slate-900/50 border border-slate-700/40 rounded-xl p-2.5 flex justify-between items-center text-xs">
                        <div>
                            <span class="font-bold text-slate-200 block">${nome}</span>
                            <span class="text-[10px] text-slate-400">${giornoStr} - Reale: ${oraReale}</span>
                        </div>
                        <div class="text-right">
                            <span class="px-1.5 py-0.5 rounded border text-[9px] font-bold ${colore}">${t.tipo_azione}</span>
                            <div class="font-mono text-sky-400 font-bold mt-0.5">${oraCalcolata}</div>
                        </div>
                    </div>
                `;
            });
        }

        function resetFiltri() {
            document.getElementById('filtro-dipendente').value = 'tutti';
            document.getElementById('filtro-mese').value = new Date().toISOString().substring(0, 7);
            filtraERenderizza();
        }

        // SALVATAGGIO INSERIMENTI: CORRETTO PER SUPABASE
        async function aggiungiTimbraturaManuale() {
            const dipendenteId = document.getElementById('manual-dipendente').value;
            const orarioStringa = document.getElementById('manual-orario').value;
            const azioneSelezionata = document.querySelector('input[name="manual-azione"]:checked').value;

            if (!dipendenteId || !orarioStringa) { 
                alert("Compila tutti i campi richiesti (Dipendente e Data/Ora)."); 
                return; 
            }

            // ISO garantisce la lettura sicura da parte del Database
            const dataVerificata = new Date(orarioStringa).toISOString();

            try {
                const { error } = await supabaseClient.from('timbrature').insert({
                    dipendente_id: dipendenteId,
                    orario: dataVerificata,
                    tipo_azione: azioneSelezionata
                });

                if (error) {
                    console.error("Dettaglio errore Supabase:", error);
                    throw error;
                }

                alert("Operazione completata con successo! Registro aggiornato.");
                document.getElementById('manual-orario').value = '';
                
                await caricaDati();
                apriLabel('label-timbrature', document.querySelectorAll('.tab-btn')[0]);

            } catch (err) {
                console.error(err);
                alert(`Errore durante l'inserimento: ${err.message || 'Controlla la console del browser per i dettagli.'}`);
            }
        }

        // ESPORTAZIONE PDF CON TABELLA SINTESI TOTALI
        function generaPDF() {
            if (timbratureFiltrate.length === 0) {
                alert("Nessun record da esportare.");
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFontSize(18);
            doc.text("Registro Presenze e Riepilogo Ore Commerciali", 14, 20);
            
            doc.setFontSize(9);
            const selettoreDip = document.getElementById('filtro-dipendente');
            const dipTesto = selettoreDip.value === 'tutti' ? "Tutto il personale" : selettoreDip.options[selettoreDip.selectedIndex].text;
            doc.text(`Risorsa: ${dipTesto}  |  Mese di riferimento: ${document.getElementById('filtro-mese').value}`, 14, 26);
            doc.text("Nota: Ore calcolate secondo l'arrotondamento commerciale con tolleranza dei 7 minuti.", 14, 30);

            let oreLavorateEffettive = 0;
            let giorniFerieTotali = 0;
            let giorniPermessoTotali = 0;

            let raggruppamentoLogico = {};
            timbratureFiltrate.forEach(t => {
                let dId = t.dipendente_id || 'unkn';
                if(!raggruppamentoLogico[dId]) raggruppamentoLogico[dId] = [];
                raggruppamentoLogico[dId].push(t);
            });

            for(let dId in raggruppamentoLogico){
                raggruppamentoLogico[dId].sort((a,b) => new Date(a.orario) - new Date(b.orario));
                let ultimoIn = null;
                raggruppamentoLogico[dId].forEach(r => {
                    if(r.tipo_azione === 'INGRESSO') ultimoIn = r;
                    else if(r.tipo_azione === 'USCITA' && ultimoIn) {
                        let diff = arrotondaAi15Minuti(r.orario) - arrotondaAi15Minuti(ultimoIn.orario);
                        if(diff > 0) oreLavorateEffettive += diff / (1000*60*60);
                        ultimoIn = null;
                    } else if(r.tipo_azione === 'FERIE') giorniFerieTotali++;
                      else if(r.tipo_azione === 'PERMESSO') giorniPermessoTotali++;
                });
            }

            const righeTabella = timbratureFiltrate.map(t => {
                const dataReale = new Date(t.orario);
                const giorno = dataReale.toLocaleDateString('it-IT');
                const nome = t.dipendenti ? `${t.dipendenti.nome} ${t.dipendenti.cognome}` : 'Ignoto';
                const azione = t.tipo_azione;
                
                let oraArrot = formattaOra(arrotondaAi15Minuti(t.orario));
                if(azione === 'FERIE' || azione === 'PERMESSO') oraArrot = "Giornata Intera (8h)";

                return [giorno, nome, azione, oraArrot, `(reale: ${formattaOra(dataReale)})`];
            });

            doc.autoTable({
                startY: 35,
                head: [['Data', 'Dipendente', 'Tipo Evento', 'Ora Computata', 'Scansione Originale']],
                body: righeTabella,
                theme: 'striped',
                headStyles: { fillColor: [2, 132, 199] }
            });

            let fineTabellaUno = doc.lastAutoTable.finalY || 40;
            doc.setFontSize(12);
            doc.text("QUADRO RIASSUNTIVO CONTEGGI TOTALE", 14, fineTabellaUno + 12);

            const righeTotali = [
                ["Totale Ore Effettive Lavorate nel Periodo", `${oreLavorateEffettive.toFixed(1)} Ore`],
                ["Totale Giornate di Ferie Sfruttate", `${giorniFerieTotali} Giorni (${giorniFerieTotali * 8}h computate)`],
                ["Totale Giornate di Permesso Richieste", `${giorniPermessoTotali} Giorni (${giorniPermessoTotali * 8}h computate)`],
                ["MONTE ORE GENERALE COMPLESSIVO (Lavoro + Giustificativi)", `${(oreLavorateEffettive + (giorniFerieTotali*8) + (giorniPermessoTotali*8)).toFixed(1)} Ore`]
            ];

            doc.autoTable({
                startY: fineTabellaUno + 16,
                head: [['Voce di Resoconto Contabile', 'Totale Accumulato']],
                body: righeTotali,
                theme: 'grid',
                headStyles: { fillColor: [30, 41, 59] },
                columnStyles: { 1: { fontStyle: 'bold', halign: 'right' } }
            });

            doc.save(`Resoconto_Totale_Presenze.pdf`);
        }

        async function aggiungiDipendente() {
            const nome = document.getElementById('nuovo-nome').value.trim();
            const cognome = document.getElementById('nuovo-cognome').value.trim();
            if(!nome || !cognome) return;

            const { error } = await supabaseClient.from('dipendenti').insert({ nome, cognome });
            if (!error) {
                document.getElementById('nuovo-nome').value = '';
                document.getElementById('nuovo-cognome').value = '';
                caricaDati();
            }
        }

        window.onload = caricaDati;
    </script>
