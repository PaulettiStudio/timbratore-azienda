<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Console Admin</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style> touch-action: manipulation; </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col">

    <header class="bg-slate-800 border-b border-slate-700 p-4 sticky top-0 z-50">
        <h1 class="text-xl font-black text-white text-center mb-4">Pannello Amministratore</h1>
        
        <div class="flex bg-slate-900 rounded-xl p-1 gap-1">
            <button onclick="apriLabel('label-timbrature', this)" class="tab-btn flex-1 py-2 text-sm font-bold rounded-lg bg-sky-600 text-white transition">Lista Ore</button>
            <button onclick="apriLabel('label-export', this)" class="tab-btn flex-1 py-2 text-sm font-bold rounded-lg text-slate-400 hover:text-white transition">Export PDF</button>
            <button onclick="apriLabel('label-dipendenti', this)" class="tab-btn flex-1 py-2 text-sm font-bold rounded-lg text-slate-400 hover:text-white transition">Dipendenti</button>
        </div>
    </header>

    <main class="flex-grow w-full max-w-md mx-auto p-4">
        
        <section id="label-timbrature" class="tab-content flex flex-col gap-4">
            <div class="flex justify-between items-center">
                <h2 class="text-sm font-bold text-slate-400 uppercase">Ultime Timbrature</h2>
                <button onclick="caricaDati()" class="text-xs bg-slate-700 px-3 py-1.5 rounded-lg font-bold">↻ Aggiorna</button>
            </div>
            <div id="lista-timbrature" class="flex flex-col gap-3">
                <p class="text-center text-slate-500 text-sm mt-10 animate-pulse">Caricamento dati in corso...</p>
            </div>
        </section>

        <section id="label-export" class="tab-content hidden flex flex-col gap-4">
            <h2 class="text-sm font-bold text-slate-400 uppercase">Calendario delle Ore</h2>
            <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 text-center flex flex-col gap-4">
                <div class="p-4 bg-sky-500/10 rounded-full w-16 h-16 mx-auto flex items-center justify-center text-sky-400">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" /></svg>
                </div>
                <p class="text-sm text-slate-300">Genera un documento PDF formattato con tutte le timbrature, calcolate con arrotondamento ai 15 minuti.</p>
                <button onclick="generaPDF()" class="bg-sky-600 hover:bg-sky-500 text-white font-black text-lg p-4 rounded-xl shadow-lg mt-2 active:scale-95 transition">
                    Scarica Report PDF
                </button>
            </div>
        </section>

        <section id="label-dipendenti" class="tab-content hidden flex flex-col gap-4">
            <div class="bg-slate-800 border border-slate-700 rounded-xl p-4 flex flex-col gap-3">
                <h3 class="text-xs font-bold text-emerald-400 uppercase">Aggiungi Nuovo</h3>
                <div class="flex gap-2">
                    <input type="text" id="nuovo-nome" placeholder="Nome" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm w-full">
                    <input type="text" id="nuovo-cognome" placeholder="Cognome" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm w-full">
                </div>
                <button onclick="aggiungiDipendente()" class="bg-emerald-600 font-bold p-2.5 rounded-lg text-sm">Salva Profilo</button>
            </div>

            <h2 class="text-sm font-bold text-slate-400 uppercase mt-4">Link Dipendenti</h2>
            <div id="lista-dipendenti" class="flex flex-col gap-3"></div>
        </section>

    </main>

    <script>
        // CONFIGURAZIONE SUPABASE
        const SUPABASE_URL = 'https://gwvzrpuzhxvbxemdqapn.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_OmznfN1ZKY_2wkvW-LMtpA_5ITT0Q1B';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let timbratureGlobali = []; // Salva i dati in memoria per la generazione del PDF

        // FUNZIONE: GESTIONE SCHEDE (LABEL)
        function apriLabel(idLabel, bottone) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(idLabel).classList.remove('hidden');
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-sky-600', 'text-white');
                btn.classList.add('text-slate-400');
            });
            bottone.classList.remove('text-slate-400');
            bottone.classList.add('bg-sky-600', 'text-white');
        }

        // FUNZIONE: ARROTONDAMENTO MATEMATICO AI 15 MINUTI PIÙ VICINI
        function arrotondaAi15Minuti(dataIso) {
            let d = new Date(dataIso);
            let m = d.getMinutes();
            let arrot = Math.round(m / 15) * 15;
            
            if (arrot === 60) {
                d.setHours(d.getHours() + 1);
                d.setMinutes(0);
            } else {
                d.setMinutes(arrot);
            }
            d.setSeconds(0);
            return d;
        }

        function formattaOra(dataOggetto) {
            return dataOggetto.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
        }

        // CARICAMENTO GLOBALE DELLE TIMBRATURE
        async function caricaDati() {
            const containerTimbrature = document.getElementById('lista-timbrature');
            
            try {
                const { data: timbrature, error } = await supabaseClient
                    .from('timbrature')
                    .select('id, orario, tipo_azione, dipendenti(nome, cognome)')
                    .order('orario', { ascending: false });

                if (error) throw error;
                timbratureGlobali = timbrature; // Memorizzazione per l'export

                if (!timbrature || timbrature.length === 0) {
                    containerTimbrature.innerHTML = '<p class="text-center text-sm text-slate-500">Nessuna timbratura registrata.</p>';
                } else {
                    containerTimbrature.innerHTML = '';
                    timbrature.forEach(t => {
                        const dataReale = new Date(t.orario);
                        const orarioArrotondatoObj = arrotondaAi15Minuti(t.orario);
                        
                        const giornoStr = dataReale.toLocaleDateString('it-IT');
                        const oraArrotondata = formattaOra(orarioArrotondatoObj);
                        const oraReale = formattaOra(dataReale);
                        
                        const nome = t.dipendenti ? `${t.dipendenti.nome} ${t.dipendenti.cognome}` : 'Ignoto';
                        const colore = t.tipo_azione === 'INGRESSO' ? 'text-emerald-400 bg-emerald-400/10' : 'text-rose-400 bg-rose-400/10';

                        containerTimbrature.innerHTML += `
                            <div class="bg-slate-800 border border-slate-700 rounded-xl p-4 flex justify-between items-center shadow-sm">
                                <div>
                                    <h4 class="font-bold text-white text-sm">${nome}</h4>
                                    <p class="text-xs text-slate-400">${giornoStr} <span class="opacity-50">(Reale: ${oraReale})</span></p>
                                </div>
                                <div class="text-right">
                                    <div class="text-xs font-bold px-2 py-1 rounded ${colore}">${t.tipo_azione}</div>
                                    <div class="text-lg font-mono font-black text-sky-400 mt-1">${oraArrotondata}</div>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (err) {
                containerTimbrature.innerHTML = '<p class="text-rose-500 text-center">Errore caricamento dati dal database.</p>';
            }

            caricaDipendenti();
        }

        // GENERAZIONE E DOWNLOAD DEL FILE PDF CONTABILIZZATO
        function generaPDF() {
            if (timbratureGlobali.length === 0) {
                alert("Nessun dato disponibile da esportare.");
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // Intestazione documento
            doc.setFontSize(18);
            doc.text("Report Presenze Arrotondate", 14, 20);
            doc.setFontSize(10);
            doc.text("Arrotondamento ore eseguito automaticamente ai 15 minuti piu' vicini.", 14, 28);

            // Mappatura delle righe per la tabella PDF
            const righeTabella = timbratureGlobali.map(t => {
                const dataReale = new Date(t.orario);
                const orarioArrotondatoObj = arrotondaAi15Minuti(t.orario);
                
                const giorno = dataReale.toLocaleDateString('it-IT');
                const nome = t.dipendenti ? `${t.dipendenti.nome} ${t.dipendenti.cognome}` : 'Ignoto';
                const azione = t.tipo_azione;
                const oraArrot = formattaOra(orarioArrotondatoObj);
                const oraReale = formattaOra(dataReale);

                return [giorno, nome, azione, oraArrot, `(reale: ${oraReale})`];
            });

            // Struttura ed estetica della tabella
            doc.autoTable({
                startY: 35,
                head: [['Data', 'Dipendente', 'Azione', 'Ora Arrotondata', 'Orario Reale']],
                body: righeTabella,
                theme: 'striped',
                headStyles: { fillColor: [2, 132, 199] } // Colore Sky-600 di Tailwind
            });

            doc.save(`Presenze_${new Date().toLocaleDateString('it-IT')}.pdf`);
        }

        // CARICAMENTO ANAGRAFICA E GENERAZIONE DI LINK DINAMICI SANI
        async function caricaDipendenti() {
            const container = document.getElementById('lista-dipendenti');
            try {
                const { data: dipendenti, error } = await supabaseClient.from('dipendenti').select('*').order('cognome');
                if (error) throw error;

                container.innerHTML = '';
                dipendenti.forEach(d => {
                    // Logica di isolamento del percorso per escludere qualsiasi nome di file (es. index.html)
                    const percorsoBase = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
                    const linkBadge = `${window.location.origin}${percorsoBase}badge.html?id=${d.id}`;
                    
                    container.innerHTML += `
                        <div class="bg-slate-800 border border-slate-700 rounded-lg p-3">
                            <div class="flex justify-between items-center mb-2">
                                <span class="font-bold text-sm text-slate-200">${d.cognome} ${d.nome}</span>
                                <button onclick="navigator.clipboard.writeText('${linkBadge}'); alert('Link copiato negli appunti!');" class="text-xs bg-slate-700 px-2 py-1 rounded font-bold hover:bg-slate-600 transition">Copia Link</button>
                            </div>
                            <div class="text-[10px] text-slate-500 font-mono break-all bg-slate-900 p-2 rounded border border-slate-950">${linkBadge}</div>
                        </div>
                    `;
                });
            } catch (e) {
                container.innerHTML = '<p class="text-rose-500 text-sm">Errore nel caricamento dei profili dipendenti.</p>';
            }
        }

        // COMPILAZIONE RAPIDA NUOVO DIPENDENTE
        async function aggiungiDipendente() {
            const nome = document.getElementById('nuovo-nome').value.trim();
            const cognome = document.getElementById('nuovo-cognome').value.trim();

            if(!nome || !cognome) { alert("Compila sia il nome che il cognome."); return; }

            const { error } = await supabaseClient.from('dipendenti').insert({ nome, cognome });
            if (error) {
                alert("Errore durante il salvataggio: " + error.message);
            } else {
                document.getElementById('nuovo-nome').value = '';
                document.getElementById('nuovo-cognome').value = '';
                caricaDati();
            }
        }

        // Esecuzione al caricamento della pagina
        window.onload = caricaDati;
    </script>
</body>
</html>
