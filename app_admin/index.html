    <script>
        const SUPABASE_URL = 'https://gwvzrpuzhxvbxemdqapn.supabase.co';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let timbratureGlobali = []; 
        let dipendentiGlobali = [];
        let idFiltroAttuale = null;

        function initRealtime() {

        function mostraNotifica(record) {

        function apriLabel(idLabel, bottone) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));

        // GESTIONE CAMPI DINAMICI INSERIMENTO E MODIFICA
        function toggleModoInserimento() {
            const val = document.querySelector('input[name="manual-azione"]:checked').value;
            document.getElementById('container-standard').classList.add('hidden');
            document.getElementById('container-ferie').classList.add('hidden');

            }
        }

        function toggleEditAzione() {
            const val = document.getElementById('edit-azione').value;
            document.getElementById('edit-container-durata').classList.add('hidden');
            document.getElementById('edit-container-riposo').classList.add('hidden');

            if(val === 'FERIE' || val === 'PERMESSO') {

            } else if(val === 'RIPOSO') {
                document.getElementById('edit-container-riposo').classList.remove('hidden');
            }
        }

        // PARSER DELLE AZIONI AGGIORNATO (RIPOSO, FERIE, PERMESSO)
        function analizzaTipoAzione(tipoGrezzo) {
            if (!tipoGrezzo) return { tipo: 'Sconosciuto', ore: 0, dettaglio: '' };
            if (tipoGrezzo.startsWith('RIPOSO:')) {
                return { tipo: 'RIPOSO', dettaglio: tipoGrezzo.split(':')[1], ore: 0 };
            }
            if (tipoGrezzo.includes(':')) {
                let parti = tipoGrezzo.split(':');
                return { tipo: parti[0], ore: parseFloat(parti[1]), dettaglio: '' };
            }
            return { tipo: tipoGrezzo, ore: 0, dettaglio: '' };
        }

        function arrotondaAi15Minuti(dataIso) {
            let d = new Date(dataIso);
            let m = d.getMinutes();
            let resto = m % 15;
            let arrot = resto >= 7 ? m + (15 - resto) : m - resto;
            if (arrot === 60) { d.setHours(d.getHours() + 1); d.setMinutes(0); } 
            else { d.setMinutes(arrot); }
            d.setSeconds(0, 0);
            return d;
        }

        // Funzioni formattazione orari
        function formattaOra(d) { return d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' }); }
        function formattaOraEsatta(d) { return d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); }
        
        function getInizioSettimana(d) {
            let date = new Date(d);
            let day = date.getDay();
            let diff = date.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(date.setDate(diff)).toISOString().split('T')[0];
        }

        // --- CHIUSURA AUTOMATICA Sospesi ---
        async function gestisciChiusuraAutomaticaSospesi(timbrature, includiOggi = false) {
            const oggiStr = new Date().toISOString().split('T')[0];
            let operazioniInsert = [];

            const raggruppati = timbrature.reduce((acc, t) => {
                const d = t.orario.split('T')[0];
                if(!includiOggi && d === oggiStr) return acc; 
                
                const dId = t.dipendente_id || (t.dipendenti?.id);
                if(!dId) return acc;

                if(!acc[d]) acc[d] = {};
                if(!acc[d][dId]) acc[d][dId] = [];
                acc[d][dId].push(t);
                return acc;
            }, {});

            for (const data in raggruppati) {
                for (const dId in raggruppati[data]) {
                    let recs = raggruppati[data][dId].sort((a,b) => new Date(a.orario) - new Date(b.orario));
                    let ultimoIn = null;
                    
                    recs.forEach(r => {
                        let info = analizzaTipoAzione(r.tipo_azione);
                        if (info.tipo === 'INGRESSO') ultimoIn = r;
                        else if (info.tipo === 'USCITA') ultimoIn = null;
                    });
                    
                    if (ultimoIn) {
                        let dataIn = new Date(ultimoIn.orario);
                        let hourIn = dataIn.getHours();
                        let minIn = dataIn.getMinutes();
                        
                        let isMattina = (hourIn < 12) || (hourIn === 12 && minIn <= 30);
                        let dataUscita = new Date(dataIn);
                        
                        if (isMattina) {
                            dataUscita.setHours(12, 30, 0, 0);
                        } else {
                            dataUscita.setHours(19, 0, 0, 0);
                        }
                        
                        operazioniInsert.push({
                            dipendente_id: dId,
                            orario: dataUscita.toISOString(),
                            tipo_azione: 'USCITA',
                            latitudine: 0,
                            longitudine: 0
                        });
                    }
                }
            }

            if(operazioniInsert.length > 0) {
                try {
                    await supabaseClient.from('timbrature').insert(operazioniInsert);
                    return true;
                } catch(e) { return false; }
            }
            return false;
        }

        async function forzaChiusuraManuale() {

                dipendentiGlobali = dipendenti;

                const { data: timbrature, error: tErr } = await supabaseClient
                    .from('timbrature')

                    .order('orario', { ascending: false });
                if (tErr) throw tErr;
                
                const necessitaRicarica = await gestisciChiusuraAutomaticaSospesi(timbrature, false);
                
                if (necessitaRicarica) {

        function filtraERenderizza() {
            if(!idFiltroAttuale) return;

            const meseFiltro = document.getElementById('filtro-mese').value; 
            let filtrate = timbratureGlobali.filter(t => {
                let checkDip = String(t.dipendente_id || (t.dipendenti?.id)) === String(idFiltroAttuale);
                let checkMese = meseFiltro ? t.orario.startsWith(meseFiltro) : true;
                return checkDip && checkMese;
            });

            calcolaStatistiche(filtrate, meseFiltro);
            renderizzaCalendarioSoloOre(filtrate, meseFiltro);
            renderizzaListaGruppiGiornalieri(filtrate);
        }

        function calcolaStatistiche(filtrate, meseFiltro) {
            let totOggi = 0; let totSettimana = 0; let totMese = 0;
            const oggiStr = new Date().toISOString().split('T')[0];
            const inizioSettimanaStr = getInizioSettimana(new Date());

            let sorted = [...filtrate].sort((a, b) => new Date(a.orario) - new Date(b.orario));
            let ultimoIn = null;

            sorted.forEach(t => {
                let dataObj = new Date(t.orario);
                let dStr = dataObj.toISOString().split('T')[0];
                let sStr = getInizioSettimana(dataObj);
                let mStr = t.orario.substring(0, 7);

                let info = analizzaTipoAzione(t.tipo_azione);
                let oreAgg = 0;

                if (info.tipo === 'INGRESSO') { ultimoIn = t; } 
                else if (info.tipo === 'USCITA') {
                    if (ultimoIn) {
                        let diff = arrotondaAi15Minuti(t.orario) - arrotondaAi15Minuti(ultimoIn.orario);
                        if (diff > 0) oreAgg = diff / (1000 * 60 * 60);
                        ultimoIn = null;
                    }
                } 
                else if (info.tipo === 'FERIE' || info.tipo === 'PERMESSO') { oreAgg = info.ore; }

                if (oreAgg > 0) {
                    if (dStr === oggiStr) totOggi += oreAgg;
                    if (sStr === inizioSettimanaStr) totSettimana += oreAgg;
                    if (mStr === meseFiltro) totMese += oreAgg;
                }
            });

            document.getElementById('ore-oggi').innerText = totOggi.toFixed(1) + 'h';
            document.getElementById('ore-settimana').innerText = totSettimana.toFixed(1) + 'h';
            document.getElementById('ore-mese').innerText = totMese.toFixed(1) + 'h';
        }

        function renderizzaCalendarioSoloOre(filtrate, meseSceltoStr) {
            const griglia = document.getElementById('griglia-calendario-fisico');
            griglia.innerHTML = '';
            if(!meseSceltoStr) return;

            const [anno, mese] = meseSceltoStr.split('-').map(Number);
            document.getElementById('nome-mese-titolo').innerText = new Date(anno, mese - 1, 1).toLocaleDateString('it-IT', { month: 'long', year: 'numeric' });

            const ggTotali = new Date(anno, mese, 0).getDate();
            let ggStart = new Date(anno, mese - 1, 1).getDay();
            ggStart = ggStart === 0 ? 6 : ggStart - 1;

            let datiGiornalieri = {};
            filtrate.forEach(t => {
                let gNum = new Date(t.orario).getDate();
                if(!datiGiornalieri[gNum]) datiGiornalieri[gNum] = [];
                datiGiornalieri[gNum].push(t);
            });

            for (let i = 0; i < ggStart; i++) {
                griglia.innerHTML += `<div class="bg-transparent h-12"></div>`;
            }

            for (let g = 1; g <= ggTotali; g++) {
                let oreGiornoTotale = 0;
                let tipoGiornoSpeciale = null;
                let dettaglioSpeciale = '';
                
                if (datiGiornalieri[g] && datiGiornalieri[g].length > 0) {
                    let arr = datiGiornalieri[g].sort((a,b) => new Date(a.orario) - new Date(b.orario));
                    let uIn = null;
                    arr.forEach(rec => {
                        let info = analizzaTipoAzione(rec.tipo_azione);
                        if(info.tipo === 'INGRESSO') uIn = rec;
                        else if(info.tipo === 'USCITA' && uIn) {
                            let diff = arrotondaAi15Minuti(rec.orario) - arrotondaAi15Minuti(uIn.orario);
                            if(diff > 0) oreGiornoTotale += diff/(1000*60*60);
                            uIn = null;
                        } else if(info.tipo === 'FERIE' || info.tipo === 'PERMESSO') {
                            tipoGiornoSpeciale = 'FERIE';
                            oreGiornoTotale += info.ore;
                        } else if(info.tipo === 'RIPOSO') {
                            tipoGiornoSpeciale = 'RIPOSO';
                            dettaglioSpeciale = info.dettaglio;
                        }
                    });
                }

                let badgeOreHtml = '';
                if (tipoGiornoSpeciale === 'RIPOSO') {
                    badgeOreHtml = `<div class="text-[9px] bg-sky-500 text-white font-bold rounded px-1 text-center py-0.5 leading-tight truncate shadow-sm">Riposo<br>${dettaglioSpeciale}</div>`;
                } else if (tipoGiornoSpeciale === 'FERIE') {
                    badgeOreHtml = `<div class="text-[9px] bg-amber-500 text-slate-900 font-bold rounded px-1 text-center py-0.5 leading-tight shadow-sm">Ferie<br>${oreGiornoTotale}h</div>`;
                } else if (oreGiornoTotale > 0) {
                    badgeOreHtml = `<div class="text-[11px] bg-emerald-500 text-slate-950 font-black rounded px-1 text-center font-mono py-0.5 shadow-sm">${oreGiornoTotale.toFixed(1)}h</div>`;
                } else if (datiGiornalieri[g] && datiGiornalieri[g].length > 0) {
                    badgeOreHtml = `<div class="text-[9px] bg-slate-700 text-slate-400 font-bold rounded px-1 text-center py-0.5">Scansioni</div>`;
                }

                griglia.innerHTML += `
                    <div class="bg-slate-900/80 border border-slate-700 h-14 rounded-xl p-1 flex flex-col justify-between shadow-inner">
                        <span class="text-[10px] font-bold text-slate-400 pl-0.5">${g}</span>
                        ${badgeOreHtml}
                    </div>

            }
        }

        async function aggiungiTimbraturaManuale() {
            const dipIdStr = document.getElementById('manual-dipendente').value;
            let azioneSel = document.querySelector('input[name="manual-azione"]:checked').value;
            if (!dipIdStr) return alert("Seleziona un dipendente.");

            let operazioniInsert = [];

            if (azioneSel === 'INGRESSO' || azioneSel === 'USCITA') {
                const orarioStr = document.getElementById('manual-orario').value;
                if (!orarioStr) return alert("Inserisci l'orario.");
                operazioniInsert.push({ dipendente_id: dipIdStr, orario: new Date(orarioStr).toISOString(), tipo_azione: azioneSel, latitudine:0, longitudine:0 });
            } 
            else if (azioneSel === 'RIPOSO') {
                const dataStr = document.getElementById('manual-riposo-data').value;
                const turno = document.getElementById('manual-riposo-turno').value;
                if (!dataStr) return alert("Inserisci la data del riposo.");
                
                let d = new Date(dataStr);
                d.setHours(8, 0, 0, 0); 
                operazioniInsert.push({ dipendente_id: dipIdStr, orario: d.toISOString(), tipo_azione: `RIPOSO:${turno}`, latitudine:0, longitudine:0 });
            }
            else if (azioneSel === 'FERIE') {
                const dalStr = document.getElementById('manual-ferie-dal').value;
                const alStr = document.getElementById('manual-ferie-al').value;
                const ore = document.getElementById('manual-ferie-ore').value || 8;
                if (!dalStr || !alStr) return alert("Inserisci il periodo di ferie.");
                
                let start = new Date(dalStr);
                let end = new Date(alStr);
                if(start > end) return alert("La data 'Dal' deve essere precedente o uguale alla data 'Al'.");

                let currentDate = new Date(start);
                while(currentDate <= end) {
                    let d = new Date(currentDate);
                    d.setHours(8, 0, 0, 0);
                    // Previene sfasamenti di timezone inserendo esattamente la data scelta a mezzogiorno locale
                    let dLocal = new Date(d.getTime() - d.getTimezoneOffset() * 60000);
                    
                    operazioniInsert.push({ 
                        dipendente_id: dipIdStr, 
                        orario: dLocal.toISOString(), 
                        tipo_azione: `FERIE:${ore}`, 
                        latitudine: 0, 
                        longitudine: 0 
                    });
                    currentDate.setDate(currentDate.getDate() + 1);
                }
            }

            try {
                await supabaseClient.from('timbrature').insert(operazioniInsert);
                alert("Salvataggio completato.");
                await caricaDati();
                apriLabel('label-timbrature', document.querySelectorAll('.tab-btn')[0]);
            } catch (err) { alert("Errore salvataggio: " + err.message); }
        }

                    arr.forEach(rec => {
                        let info = analizzaTipoAzione(rec.tipo_azione);
                        if(info.tipo === 'INGRESSO') uIn = rec;
                        else if(info.tipo === 'USCITA' && uIn) {
                            let diff = arrotondaAi15Minuti(rec.orario) - arrotondaAi15Minuti(uIn.orario);
                            if(diff > 0) oreGiornoTotale += diff/(1000*60*60);
                            uIn = null;
                        } else if(info.tipo === 'FERIE' || info.tipo === 'PERMESSO') {
                            tipoSpeciale = 'FERIE';
                            oreGiornoTotale += info.ore;
                        } else if(info.tipo === 'RIPOSO') {
                            tipoSpeciale = 'RIPOSO';
                            dettaglioSpeciale = info.dettaglio;
                        }
                    });
                }

                let contenutoCella = `${g}`;
                if (tipoSpeciale === 'RIPOSO') {
                    contenutoCella += `\n\nRiposo\n${dettaglioSpeciale}`;
                } else if (tipoSpeciale === 'FERIE') {
                    contenutoCella += `\n\nFerie\n${oreGiornoTotale}h`;
                } else if (oreGiornoTotale > 0) {
                    contenutoCella += `\n\n${oreGiornoTotale.toFixed(1)} h`;
                }
                
                rigaSettimana[indiceGiorno] = contenutoCella;
                indiceGiorno++;
                if (indiceGiorno > 6) {
                    calendarioData.push(rigaSettimana);
                    rigaSettimana = new Array(7).fill('');
                    indiceGiorno = 0;
                }
            }
            if (indiceGiorno > 0) calendarioData.push(rigaSettimana);

            doc.autoTable({
                startY: 32,
                head: [['LUN', 'MAR', 'MER', 'GIO', 'VEN', 'SAB', 'DOM']],
                body: calendarioData,
                theme: 'grid',
                styles: { halign: 'center', valign: 'middle', fontSize: 9, cellPadding: 2, minCellHeight: 14 },
                headStyles: { fillColor: [14, 165, 233], textColor: [255,255,255], fontStyle: 'bold' }
            });

            // --- 2. SEZIONE REGISTRO DETTAGLIATO ---
            const strutturato = {};
            filtrate.forEach(t => {
                const dataKey = t.orario.split('T')[0];
                if(!strutturato[dataKey]) strutturato[dataKey] = [];
                strutturato[dataKey].push(t);
            });

            let righeTabella = [];
            Object.keys(strutturato).sort().forEach(dataKey => {
                let [y, m, d] = dataKey.split('-');
                let dataFormattata = `${d}/${m}/${y}`;

                let ordinati = strutturato[dataKey].sort((a,b) => new Date(a.orario) - new Date(b.orario));
                let oreCalcolate = 0;
                let uIn = null;
                let arrayDettagli = [];

                ordinati.forEach(rec => {
                    let info = analizzaTipoAzione(rec.tipo_azione);
                    
                    let oraReport = formattaOra(arrotondaAi15Minuti(rec.orario));
                    
                    if(info.tipo === 'INGRESSO') {
                        uIn = rec;
                        arrayDettagli.push(`IN ${oraReport}`);
                    } else if(info.tipo === 'USCITA') {
                        arrayDettagli.push(`OUT ${oraReport}`);
                        if(uIn) {
                            let diff = arrotondaAi15Minuti(rec.orario) - arrotondaAi15Minuti(uIn.orario);
                            if(diff > 0) oreCalcolate += diff / (1000 * 60 * 60);
                            uIn = null;
                        }
                    } else if(info.tipo === 'FERIE' || info.tipo === 'PERMESSO') {
                        oreCalcolate += info.ore;
                        arrayDettagli.push(`${info.tipo} (${info.ore}h)`);
                    } else if(info.tipo === 'RIPOSO') {
                        arrayDettagli.push(`RIPOSO (${info.dettaglio})`);
                    }
                });

                righeTabella.push([
                    dataFormattata,
                    `${oreCalcolate.toFixed(1)} ore`,
                    arrayDettagli.join('  |  ')
                ]);
            });

            let finalYCalendario = doc.lastAutoTable.finalY || 32;
            doc.setFontSize(12);
            doc.text("REGISTRO DETTAGLIATO GIORNALIERO", 14, finalYCalendario + 12);

            doc.autoTable({ 
                startY: finalYCalendario + 16, 
                head: [['Data', 'Ore Totali', 'Sequenza Movimenti']], 
                body: righeTabella,
                theme: 'striped',
                styles: { cellPadding: 2.5, fontSize: 8.5, lineColor: [210,210,210], lineWidth: 0.1 },
                headStyles: { fillColor: [30, 41, 59], textColor: [255,255,255], fontStyle: 'bold' },
                columnStyles: {
                    0: { cellWidth: 25 },
                    1: { cellWidth: 25, textColor: [16, 185, 129], fontStyle: 'bold' }
                }
            });

            doc.save(`Report_Presenze_${nomeFiltro.replace(' ','_')}_${meseFiltro}.pdf`);
        }

        window.onload = () => {
            initRealtime();
            caricaDati();
        };
    </script>
</body>
</html>
