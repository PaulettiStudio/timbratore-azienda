<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Amministratore - Gestione Presenze</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans p-6">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 border-b border-slate-200 pb-4">
            <h1 class="text-3xl font-bold text-slate-900">Console Risorse Umane</h1>
            <p class="text-slate-500">Monitoraggio orari di ingresso/uscita e approvazione ferie e permessi</p>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8">
            <h2 class="text-xl font-bold mb-4 text-sky-700">Inserisci Assenza (Ferie, Permesso)</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">ID UUID Dipendente</label>
                    <input id="form-dipendente-id" type="text" placeholder="Incolla UUID dipendente" class="border p-2 rounded w-full text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Tipologia</label>
                    <select id="form-tipo" class="border p-2 rounded w-full text-sm">
                        <option value="ferie">Ferie</option>
                        <option value="permesso">Permesso Orario</option>
                        <option value="riposo">Riposo Compensativo</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Data Inizio</label>
                    <input id="form-inizio" type="date" class="border p-2 rounded w-full text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Totale Ore da Scalare</label>
                    <input id="form-ore" type="number" step="0.5" placeholder="Esempio: 8" class="border p-2 rounded w-full text-sm">
                </div>
            </div>
            <button onclick="creaRichiesta()" class="mt-4 bg-sky-600 text-white px-5 py-2 rounded-lg text-sm hover:bg-sky-700 font-semibold transition">Registra e Approva</button>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-slate-900">Registro Storico Timbrature Geofencing</h2>
                <button onclick="caricaTimbrature()" class="text-xs bg-slate-200 hover:bg-slate-300 text-slate-700 px-3 py-1 rounded font-medium">Aggiorna Registro</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 text-slate-700 uppercase text-xs tracking-wider border-b">
                            <th class="p-3 font-semibold">ID Dipendente</th>
                            <th class="p-3 font-semibold">Azione Rilevata</th>
                            <th class="p-3 font-semibold">Data / Orario</th>
                            <th class="p-3 font-semibold">Posizione GPS</th>
                        </tr>
                    </thead>
                    <tbody id="tabella-corpo" class="text-sm divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAZIONE SUPABASE
        const SUPABASE_URL = 'https://tuo-id-progetto.supabase.co'; 
        const SUPABASE_KEY = 'tua-chiave-anonima-public';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function caricaTimbrature() {
            const { data, error } = await supabaseClient.from('timbrature').select('*').order('orario', { ascending: false });
            if (error) { console.error("Errore dati:", error); return; }
            const corpo = document.getElementById('tabella-corpo');
            corpo.innerHTML = '';
            data.forEach(t => {
                const isIngresso = t.tipo_azione.includes('ingresso');
                const badgeColor = isIngresso ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700';
                corpo.innerHTML += `<tr class="hover:bg-slate-50 transition">
                    <td class="p-3 font-mono text-xs text-slate-500">${t.dipendente_id}</td>
                    <td class="p-3"><span class="px-2 py-1 rounded text-xs font-bold ${badgeColor}">${t.tipo_azione}</span></td>
                    <td class="p-3 text-slate-600">${new Date(t.orario).toLocaleString('it-IT')}</td>
                    <td class="p-3 font-mono text-xs text-slate-400">${t.latitudine.toFixed(5)}, ${t.longitudine.toFixed(5)}</td>
                </tr>`;
            });
        }

        async function creaRichiesta() {
            const dipId = document.getElementById('form-dipendente-id').value;
            const tipo = document.getElementById('form-tipo').value;
            const dataInizio = document.getElementById('form-inizio').value;
            const ore = document.getElementById('form-ore').value;

            if(!dipId || !dataInizio || !ore) { alert("Compila tutti i campi!"); return; }

            const { error } = await supabaseClient.from('richieste_assenza').insert({
                dipendente_id: dipId,
                tipo: tipo,
                data_inizio: dataInizio,
                data_fine: dataInizio,
                ore_totali: parseFloat(ore),
                stato: 'approvato'
            });

            if (error) { alert("Errore: " + error.message); } 
            else { alert("Assenza registrata!"); document.getElementById('form-ore').value = ''; caricaTimbrature(); }
        }
        caricaTimbrature();
    </script>
</body>
</html>
